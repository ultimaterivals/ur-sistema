<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Check-in · Ultimate Rivals</title>
<meta name="theme-color" content="#ffd84d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#030305;--surface:#0d0d10;--card:#0d0d10;--border:rgba(255,216,77,.12);
  --border-dim:rgba(255,255,255,.06);
  --gold:#ffd84d;--gold2:#f5c518;--goldglow:rgba(255,216,77,.28);--goldglow-sm:rgba(255,216,77,.15);
  --text:#eae6d8;--muted:rgba(255,255,255,.42);--muted2:rgba(255,255,255,.14);
  --green:#22c55e;--green-bg:rgba(34,197,94,.08);--green-border:rgba(34,197,94,.2);
  --red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --font:'Inter',system-ui,sans-serif;--display:'Barlow Condensed',sans-serif;
  --header-h:64px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100dvh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,216,77,.06) 0%, transparent 70%);
}

/* ══════════════════════════════
   HEADER — sticky, full premium
══════════════════════════════ */
.header{
  background:rgba(3,3,5,.97);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,216,77,.18);
  padding:0 18px;
  height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 0 rgba(255,216,77,.08), 0 4px 24px rgba(0,0,0,.6);
}
/* gold glow line below header */
.header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 30%,var(--gold) 70%,transparent 100%);
  opacity:.35;
}
.header-logos{display:flex;align-items:center;gap:0}
.header-logos img{
  height:38px;object-fit:contain;
  filter:drop-shadow(0 0 8px rgba(255,216,77,.4));
}
.header-logos img.logo-hunter{height:36px}
.logo-sep{width:1px;height:28px;background:rgba(255,216,77,.22);margin:0 12px}
.header-center{
  position:absolute;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;
}
.header-title{
  font-family:var(--display);font-size:15px;font-weight:900;
  color:var(--text);letter-spacing:1.5px;text-transform:uppercase;line-height:1;
}
.header-title span{color:var(--gold)}
.header-sub{
  font-size:9px;color:var(--muted);font-weight:600;
  letter-spacing:2px;text-transform:uppercase;margin-top:3px;
}
.header-date{
  font-family:var(--display);font-size:12px;font-weight:700;
  color:var(--muted);letter-spacing:.8px;text-transform:uppercase;
  text-align:right;white-space:nowrap;
}

/* ══════════════════════════════
   EVENT SELECTOR — pills
══════════════════════════════ */
.event-bar{
  padding:12px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border-dim);
  background:linear-gradient(180deg, rgba(255,216,77,.03) 0%, transparent 100%);
}
.event-bar::-webkit-scrollbar{display:none}
.evt-btn{
  flex-shrink:0;font-family:var(--display);font-size:13px;font-weight:800;
  padding:7px 18px;border-radius:50px;border:1px solid var(--border-dim);
  background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;
  transition:all .18s;letter-spacing:.8px;text-transform:uppercase;
}
.evt-btn:hover{border-color:rgba(255,216,77,.3);color:var(--text)}
.evt-btn.active{
  background:var(--gold);color:#000;border-color:var(--gold);
  box-shadow:0 0 18px var(--goldglow), 0 2px 8px rgba(0,0,0,.4);
  font-weight:900;
}

/* ══════════════════════════════
   STATS BAR
══════════════════════════════ */
.stats-bar{
  padding:16px 20px;display:flex;gap:0;align-items:stretch;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.stat-chip{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;text-align:center;padding:4px 8px;
}
.stat-n{
  font-family:var(--display);font-size:34px;font-weight:900;
  color:var(--gold);line-height:1;
  text-shadow:0 0 20px var(--goldglow);
}
.stat-l{
  font-size:9px;color:var(--muted);font-weight:600;
  text-transform:uppercase;letter-spacing:1.2px;line-height:1.4;
}
.stat-div{width:1px;background:var(--border);align-self:stretch;margin:6px 0}

/* ══════════════════════════════
   SEARCH
══════════════════════════════ */
.search-wrap{
  padding:14px 16px;position:sticky;top:var(--header-h);z-index:90;
  background:var(--bg);
  border-bottom:1px solid var(--border-dim);
  position:relative;
}
.search-wrap{position:sticky;top:var(--header-h);z-index:90;background:var(--bg);padding:12px 16px;border-bottom:1px solid var(--border-dim)}
.search-inner{position:relative}
.search-input{
  width:100%;background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;padding:13px 18px 13px 46px;
  font-size:16px;color:var(--text);font-family:var(--font);outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{
  border-color:rgba(255,216,77,.5);
  box-shadow:0 0 0 3px rgba(255,216,77,.08);
}
.search-icon{
  position:absolute;left:15px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:17px;pointer-events:none;
}

/* ══════════════════════════════
   LIST WRAPPER
══════════════════════════════ */
.list-wrap{padding:12px 14px 100px}
.list-count{
  font-size:10px;color:var(--muted);font-weight:600;
  letter-spacing:1.2px;text-transform:uppercase;
  padding:4px 4px 10px;display:flex;justify-content:space-between;align-items:center;
}
.refresh-btn{
  font-family:var(--display);font-size:12px;color:var(--gold);font-weight:800;
  cursor:pointer;background:none;border:1px solid var(--border);
  border-radius:6px;padding:4px 12px;transition:all .18s;
  letter-spacing:.8px;text-transform:uppercase;
}
.refresh-btn:hover{background:rgba(255,216,77,.08);border-color:rgba(255,216,77,.3)}

/* ══════════════════════════════
   ATHLETE CARD
══════════════════════════════ */
.ath-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
  transition:all .22s;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.ath-card:hover{border-color:rgba(255,216,77,.22);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.ath-card.done{
  border-color:var(--green-border);
  background:var(--green-bg);
  box-shadow:0 2px 12px rgba(34,197,94,.06);
}
.ath-avatar{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,216,77,.18),rgba(255,216,77,.04));
  border:1.5px solid rgba(255,216,77,.2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:17px;font-weight:900;color:var(--gold);
  flex-shrink:0;
  text-shadow:0 0 12px var(--goldglow-sm);
}
.ath-info{flex:1;min-width:0}
.ath-name{
  font-family:var(--display);font-size:19px;font-weight:800;
  text-transform:uppercase;letter-spacing:.4px;line-height:1.1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ath-meta{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
.lvl-badge{
  font-family:var(--display);font-size:10px;font-weight:800;
  letter-spacing:1.2px;padding:2px 9px;border-radius:3px;text-transform:uppercase;
}
.lv-NI,.lv-N5{background:rgba(255,255,255,.07);color:rgba(255,255,255,.45)}
.lv-N4{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.lv-N3{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.18)}
.lv-N2{background:rgba(255,216,77,.14);color:var(--gold);border:1px solid rgba(255,216,77,.2)}
.lv-N1{background:rgba(239,68,68,.14);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.ath-time{font-size:11px;color:var(--green);font-weight:600;letter-spacing:.3px}

/* ══════════════════════════════
   CHECK-IN BUTTON
══════════════════════════════ */
.ci-btn{
  flex-shrink:0;font-family:var(--display);font-size:15px;font-weight:900;
  padding:11px 20px;border-radius:10px;border:none;cursor:pointer;
  transition:all .2s;letter-spacing:.8px;text-transform:uppercase;
  background:var(--gold);color:#000;
  box-shadow:0 4px 16px var(--goldglow);
  white-space:nowrap;min-width:90px;
}
.ci-btn:hover{transform:scale(1.05);box-shadow:0 6px 24px var(--goldglow)}
.ci-btn:active{transform:scale(.96)}
.ci-btn:disabled{
  background:rgba(34,197,94,.18);color:var(--green);
  box-shadow:none;cursor:default;transform:none;
  border:1px solid rgba(34,197,94,.25);
}
.ci-btn.loading{opacity:.55;cursor:wait}

/* ══════════════════════════════
   EMPTY / LOADING STATES
══════════════════════════════ */
.state-msg{text-align:center;padding:64px 24px;color:var(--muted)}
.state-msg .icon{font-size:52px;margin-bottom:18px}
.state-msg h3{
  font-family:var(--display);font-size:24px;font-weight:800;
  text-transform:uppercase;color:var(--text);margin-bottom:8px;letter-spacing:.5px;
}
.state-msg p{font-size:14px;line-height:1.6}
.spinner{
  width:36px;height:36px;
  border:2px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 18px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════
   SUCCESS OVERLAY
══════════════════════════════ */
.success-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(3,3,5,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.success-overlay.show{opacity:1;pointer-events:all}
/* gold radial glow behind content */
.success-overlay::before{
  content:'';position:absolute;
  width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,216,77,.12) 0%, transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-60%);
  pointer-events:none;
}
.success-icon{
  font-size:76px;margin-bottom:18px;
  animation:pop .45s cubic-bezier(.2,1.5,.4,1) both;
  position:relative;z-index:1;
}
@keyframes pop{0%{transform:scale(0) rotate(-10deg)}100%{transform:scale(1) rotate(0deg)}}
.success-name{
  font-family:var(--display);font-size:clamp(38px,10vw,62px);font-weight:900;
  text-transform:uppercase;color:#fff;margin-bottom:8px;line-height:1;
  letter-spacing:1px;position:relative;z-index:1;
}
.success-level{display:inline-block;margin-bottom:22px;position:relative;z-index:1}
.success-msg{
  font-family:var(--display);font-size:22px;font-weight:900;
  color:var(--gold);text-transform:uppercase;letter-spacing:2px;
  margin-bottom:36px;position:relative;z-index:1;
  text-shadow:0 0 24px var(--goldglow);
}
.success-close{
  background:var(--gold);color:#000;
  font-family:var(--display);font-size:18px;font-weight:900;
  padding:15px 48px;border-radius:12px;border:none;cursor:pointer;
  letter-spacing:.8px;text-transform:uppercase;transition:all .2s;
  box-shadow:0 6px 24px var(--goldglow);position:relative;z-index:1;
}
.success-close:hover{transform:scale(1.05)}
.success-close:active{transform:scale(.97)}

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-family:var(--font);font-size:13px;font-weight:600;
  padding:12px 24px;border-radius:10px;
  transition:transform .3s cubic-bezier(.2,1,.4,1);z-index:200;
  white-space:nowrap;box-shadow:0 8px 36px rgba(0,0,0,.6);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media(max-width:400px){
  .header-title{font-size:13px}
  .ath-name{font-size:17px}
  .ci-btn{font-size:13px;padding:10px 14px;min-width:80px}
  .stat-n{font-size:28px}
}
@media(max-width:340px){
  .header-logos img{height:30px}
  .header-logos img.logo-hunter{height:28px}
  .ath-name{font-size:15px}
  .ci-btn{font-size:12px;padding:9px 11px;min-width:72px}
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="header">
  <div class="header-logos">
    <img src="logo-ur-3d.png" alt="UR" onerror="this.style.display='none'">
    <div class="logo-sep"></div>
    <img src="logo-hunter.png" alt="Hunters" class="logo-hunter" onerror="this.style.display='none'">
  </div>

  <div class="header-center">
    <div class="header-title"><span>ULTIMATE RIVALS</span> / Check-in T01</div>
    <div class="header-sub">Sistema Oficial · Temporada 2025</div>
  </div>

  <div class="header-date" id="headerDate"></div>
</div>

<!-- ══ EVENT SELECTOR ══ -->
<div class="event-bar" id="eventBar">
  <button class="evt-btn active" data-evt="UR Play">🏐 UR Play</button>
  <button class="evt-btn" data-evt="Mini Torneio">🏆 Mini Torneio</button>
  <button class="evt-btn" data-evt="UR Series">⚡ UR Series</button>
</div>

<!-- ══ STATS BAR ══ -->
<div class="stats-bar">
  <div class="stat-chip">
    <div class="stat-n" id="statConfirmed">—</div>
    <div class="stat-l">Confirmados<br>Hoje</div>
  </div>
  <div class="stat-div"></div>
  <div class="stat-chip">
    <div class="stat-n" id="statTotal">—</div>
    <div class="stat-l">Atletas<br>na Liga</div>
  </div>
  <div class="stat-div"></div>
  <div class="stat-chip">
    <div class="stat-n" id="statEvent" style="font-size:15px;color:var(--muted);text-shadow:none">UR Play</div>
    <div class="stat-l">Evento<br>Ativo</div>
  </div>
</div>

<!-- ══ SEARCH ══ -->
<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text"
      placeholder="Buscar seu nome..."
      autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</div>

<!-- ══ ATHLETE LIST ══ -->
<div class="list-wrap">
  <div class="list-count">
    <span id="listCount">Carregando...</span>
    <button class="refresh-btn" id="refreshBtn">↺ Atualizar</button>
  </div>
  <div id="athleteList">
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Carregando atletas...</p>
    </div>
  </div>
</div>

<!-- ══ SUCCESS OVERLAY ══ -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
  <div class="success-name" id="successName"></div>
  <div class="success-level" id="successLevel"></div>
  <div class="success-msg">Check-in Confirmado!</div>
  <button class="success-close" id="successClose">Fechar</button>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script>
const SB_URL  = "https://ongicywqaeedgzblllus.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZ2ljeXdxYWVlZGd6YmxsbHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjY5NTYsImV4cCI6MjA5NDM0Mjk1Nn0.UtVWQPL88y5-KR-qtttqnrOwG7_MtfWV-V_enmABCso";
const HEADERS = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" };
const TODAY   = new Date().toISOString().split("T")[0];

let athletes   = [];
let checkins   = {};      // athleteId → { checked_in_at }
let activeEvt  = "UR Play";
let searching  = false;

// ── DATE HEADER ──
(function(){
  const d = new Date();
  const opts = { weekday:"short", day:"2-digit", month:"short" };
  document.getElementById("headerDate").textContent = d.toLocaleDateString("pt-BR", opts).toUpperCase();
})();

// ── TOAST ──
function toast(msg, dur=2600){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), dur);
}

// ── SUPABASE HELPERS ──
async function sbGet(path){
  const r = await fetch(SB_URL + path, { headers: HEADERS });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(path, body){
  const r = await fetch(SB_URL + path, { method:"POST", headers: {...HEADERS, "Prefer":"resolution=merge-duplicates,return=minimal"}, body: JSON.stringify(body) });
  return r;
}

// ── LOAD ATHLETES ──
async function loadAthletes(){
  try {
    const rows = await sbGet("/rest/v1/ur_backups?id=eq.main&select=data&limit=1");
    if(!rows?.length || !rows[0].data) return [];
    const state = JSON.parse(rows[0].data);
    return (state.athletes || []).filter(a => a.name && a.name.trim()).sort((a,b) => a.name.localeCompare(b.name, "pt-BR"));
  } catch(e) {
    console.error("loadAthletes:", e);
    return [];
  }
}

// ── LOAD TODAY'S CHECK-INS ──
async function loadCheckins(){
  try {
    const rows = await sbGet(`/rest/v1/ur_checkins?event_date=eq.${TODAY}&event_type=eq.${encodeURIComponent(activeEvt)}&select=athlete_id,athlete_name,checked_in_at`);
    const map = {};
    (rows || []).forEach(r => { map[r.athlete_id] = r; });
    return map;
  } catch(e) {
    console.error("loadCheckins:", e);
    return {};
  }
}

// ── LEVEL BADGE ──
const LEVEL_NAMES = { NI:"Indefinido", N5:"Iniciante", N4:"Hunter", N3:"Experiente", N2:"Elite", N1:"Lenda" };
function levelBadge(lvl){
  const name = LEVEL_NAMES[lvl] || lvl || "—";
  return `<span class="lvl-badge lv-${lvl||"NI"}">${lvl||"NI"} · ${name}</span>`;
}

// ── RENDER LIST ──
function renderList(filter=""){
  const q = filter.toLowerCase().trim();
  const filtered = q ? athletes.filter(a => a.name.toLowerCase().includes(q)) : athletes;
  const total = filtered.length;
  const confirmed = Object.keys(checkins).length;

  document.getElementById("statConfirmed").textContent = confirmed;
  document.getElementById("statTotal").textContent = athletes.length;
  document.getElementById("statEvent").textContent = activeEvt;
  document.getElementById("listCount").textContent = q
    ? `${total} resultado${total !== 1 ? "s" : ""} para "${filter}"`
    : `${total} atleta${total !== 1 ? "s" : ""}`;

  if(!total){
    document.getElementById("athleteList").innerHTML = `
      <div class="state-msg">
        <div class="icon">🔍</div>
        <h3>Nenhum atleta</h3>
        <p>${q ? "Tente outro nome." : "Nenhum atleta cadastrado na liga ainda."}</p>
      </div>`;
    return;
  }

  document.getElementById("athleteList").innerHTML = filtered.map(a => {
    const ci = checkins[a.id];
    const done = !!ci;
    const time = ci ? new Date(ci.checked_in_at).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) : "";
    const initials = a.name.split(" ").slice(0,2).map(n=>n[0]).join("").toUpperCase();
    return `
    <div class="ath-card${done?" done":""}" id="card-${a.id}">
      <div class="ath-avatar">${initials}</div>
      <div class="ath-info">
        <div class="ath-name">${a.name}</div>
        <div class="ath-meta">
          ${levelBadge(a.level)}
          ${done ? `<span class="ath-time">✓ ${time}</span>` : ""}
        </div>
      </div>
      <button class="ci-btn" id="btn-${a.id}"
        ${done ? 'disabled' : `onclick="doCheckin('${a.id}','${a.name.replace(/'/g,"\\'")}','${a.level||"NI"}')"`}>
        ${done ? "✓ OK" : "Check-in"}
      </button>
    </div>`;
  }).join("");
}

// ── DO CHECK-IN ──
async function doCheckin(id, name, level){
  const btn = document.getElementById("btn-"+id);
  if(!btn || btn.disabled) return;
  btn.disabled = true;
  btn.classList.add("loading");
  btn.textContent = "...";

  try {
    const r = await sbPost("/rest/v1/ur_checkins", {
      athlete_id: id,
      athlete_name: name,
      event_date: TODAY,
      event_type: activeEvt,
      level: level,
      checked_in_at: new Date().toISOString()
    });

    if(r.ok || r.status === 201 || r.status === 204){
      checkins[id] = { checked_in_at: new Date().toISOString() };
      showSuccess(name, level);
      renderList(document.getElementById("searchInput").value);
    } else {
      const err = await r.text();
      if(err.includes("duplicate") || err.includes("unique")){
        checkins[id] = { checked_in_at: new Date().toISOString() };
        renderList(document.getElementById("searchInput").value);
        toast("✅ " + name.split(" ")[0] + " já está confirmado hoje!");
      } else {
        btn.disabled = false;
        btn.classList.remove("loading");
        btn.textContent = "Check-in";
        toast("Erro ao confirmar. Tente novamente.");
      }
    }
  } catch(e) {
    btn.disabled = false;
    btn.classList.remove("loading");
    btn.textContent = "Check-in";
    toast("Sem conexão. Verifique o Wi-Fi.");
  }
}

// ── SUCCESS OVERLAY ──
function showSuccess(name, level){
  document.getElementById("successName").textContent = name.split(" ")[0].toUpperCase();
  document.getElementById("successLevel").innerHTML = levelBadge(level);
  document.getElementById("successOverlay").classList.add("show");
  navigator.vibrate && navigator.vibrate([80, 40, 80]);
}
document.getElementById("successClose").onclick = () => {
  document.getElementById("successOverlay").classList.remove("show");
};

// ── EVENT SELECTOR ──
document.querySelectorAll(".evt-btn").forEach(btn => {
  btn.addEventListener("click", async () => {
    document.querySelectorAll(".evt-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeEvt = btn.dataset.evt;
    checkins = await loadCheckins();
    renderList(document.getElementById("searchInput").value);
  });
});

// ── SEARCH ──
document.getElementById("searchInput").addEventListener("input", e => {
  renderList(e.target.value);
});

// ── REFRESH ──
document.getElementById("refreshBtn").addEventListener("click", async () => {
  document.getElementById("refreshBtn").textContent = "↺ Atualizando...";
  checkins = await loadCheckins();
  renderList(document.getElementById("searchInput").value);
  document.getElementById("refreshBtn").textContent = "↺ Atualizar";
  toast("Lista atualizada!");
});

// ── INIT ──
async function init(){
  document.getElementById("athleteList").innerHTML = `
    <div class="state-msg"><div class="spinner"></div><p>Carregando atletas...</p></div>`;
  [athletes, checkins] = await Promise.all([loadAthletes(), loadCheckins()]);
  if(!athletes.length){
    document.getElementById("athleteList").innerHTML = `
      <div class="state-msg">
        <div class="icon">⚠️</div>
        <h3>Sem atletas</h3>
        <p>Sincronize o sistema com o Supabase primeiro para que os atletas apareçam aqui.</p>
      </div>`;
    document.getElementById("listCount").textContent = "0 atletas";
    document.getElementById("statTotal").textContent = "0";
    document.getElementById("statConfirmed").textContent = "0";
    return;
  }
  renderList();
}

init();
</script>
</body>
</html>
