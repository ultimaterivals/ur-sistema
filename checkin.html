<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Check-in · Ultimate Rivals</title>
<meta name="theme-color" content="#ffd84d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050507;--surface:#0d0d10;--card:#141418;--border:rgba(255,255,255,.08);
  --gold:#ffd84d;--gold2:#f5c518;--goldglow:rgba(255,216,77,.25);
  --text:#e8e3d4;--muted:rgba(255,255,255,.42);--muted2:rgba(255,255,255,.16);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --font:'Inter',system-ui,sans-serif;--display:'Barlow Condensed',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden}

/* ── HEADER ── */
.header{
  background:rgba(5,5,7,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{font-family:var(--display);font-size:22px;font-weight:900;color:var(--gold);letter-spacing:.5px}
.header-sub{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.header-date{font-family:var(--display);font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;text-align:right}

/* ── EVENT SELECTOR ── */
.event-bar{padding:14px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.event-bar::-webkit-scrollbar{display:none}
.evt-btn{
  flex-shrink:0;font-family:var(--display);font-size:14px;font-weight:800;
  padding:8px 18px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;
  letter-spacing:.5px;text-transform:uppercase;
}
.evt-btn.active{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 4px 18px var(--goldglow)}

/* ── STATS BAR ── */
.stats-bar{
  padding:14px 18px;display:flex;gap:14px;align-items:center;
  border-bottom:1px solid var(--border);background:var(--surface);
}
.stat-chip{display:flex;align-items:center;gap:7px}
.stat-n{font-family:var(--display);font-size:28px;font-weight:900;color:var(--gold);line-height:1}
.stat-l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.stat-div{width:1px;height:32px;background:var(--border)}

/* ── SEARCH ── */
.search-wrap{padding:14px 16px;position:sticky;top:57px;z-index:90;background:var(--bg)}
.search-input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 18px 14px 46px;
  font-size:16px;color:var(--text);font-family:var(--font);outline:none;
  transition:border-color .18s;
}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:rgba(255,216,77,.4)}
.search-icon{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;pointer-events:none}
.search-wrap{position:relative}

/* ── LIST ── */
.list-wrap{padding:10px 12px 100px}
.list-count{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px 4px 10px;display:flex;justify-content:space-between;align-items:center}
.refresh-btn{font-size:11px;color:var(--gold);font-weight:700;cursor:pointer;background:none;border:none;font-family:var(--font);letter-spacing:.5px;text-transform:uppercase;padding:4px 8px;border-radius:4px;transition:all .18s}
.refresh-btn:hover{background:rgba(255,216,77,.1)}

/* ── ATHLETE CARD ── */
.ath-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
  transition:all .2s;
}
.ath-card.done{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.ath-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,216,77,.15),rgba(255,216,77,.04));
  border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:17px;font-weight:900;color:var(--gold);
  flex-shrink:0;
}
.ath-info{flex:1;min-width:0}
.ath-name{font-family:var(--display);font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ath-meta{display:flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap}
.lvl-badge{font-family:var(--display);font-size:11px;font-weight:800;letter-spacing:1px;padding:2px 8px;border-radius:3px;text-transform:uppercase}
.lv-NI,.lv-N5{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
.lv-N4{background:rgba(59,130,246,.15);color:#60a5fa}
.lv-N3{background:rgba(34,197,94,.12);color:#4ade80}
.lv-N2{background:rgba(255,216,77,.15);color:var(--gold)}
.lv-N1{background:rgba(239,68,68,.15);color:#f87171}
.ath-time{font-size:11px;color:var(--green);font-weight:600}

/* ── CHECK-IN BUTTON ── */
.ci-btn{
  flex-shrink:0;font-family:var(--display);font-size:14px;font-weight:900;
  padding:10px 16px;border-radius:10px;border:none;cursor:pointer;
  transition:all .2s;letter-spacing:.5px;text-transform:uppercase;
  background:var(--gold);color:#000;box-shadow:0 4px 14px var(--goldglow);
  white-space:nowrap;
}
.ci-btn:hover{transform:scale(1.04);box-shadow:0 6px 20px var(--goldglow)}
.ci-btn:active{transform:scale(.97)}
.ci-btn:disabled{background:rgba(34,197,94,.2);color:var(--green);box-shadow:none;cursor:default;transform:none}
.ci-btn.loading{opacity:.6;cursor:wait}

/* ── EMPTY / LOADING ── */
.state-msg{text-align:center;padding:60px 24px;color:var(--muted)}
.state-msg .icon{font-size:52px;margin-bottom:16px}
.state-msg h3{font-family:var(--display);font-size:22px;font-weight:800;text-transform:uppercase;color:var(--text);margin-bottom:8px}
.state-msg p{font-size:14px;line-height:1.6}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SUCCESS OVERLAY ── */
.success-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(5,5,7,.96);backdrop-filter:blur(12px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.success-overlay.show{opacity:1;pointer-events:all}
.success-icon{font-size:80px;margin-bottom:16px;animation:pop .4s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.success-name{font-family:var(--display);font-size:clamp(32px,9vw,56px);font-weight:900;text-transform:uppercase;color:#fff;margin-bottom:6px;line-height:1}
.success-level{display:inline-block;margin-bottom:20px}
.success-msg{font-family:var(--display);font-size:20px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:32px}
.success-close{background:var(--gold);color:#000;font-family:var(--display);font-size:18px;font-weight:900;padding:14px 40px;border-radius:12px;border:none;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:all .2s}
.success-close:hover{transform:scale(1.04)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-size:14px;font-weight:600;padding:12px 22px;border-radius:10px;
  transition:transform .3s;z-index:200;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:380px){
  .ath-name{font-size:16px}
  .ci-btn{font-size:12px;padding:9px 12px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div>
      <div class="header-logo">⚡ ULTIMATE RIVALS</div>
      <div class="header-sub">Check-in · Temporada T01</div>
    </div>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<!-- EVENT SELECTOR -->
<div class="event-bar" id="eventBar">
  <button class="evt-btn active" data-evt="UR Play">🏐 UR Play</button>
  <button class="evt-btn" data-evt="Mini Torneio">🏆 Mini Torneio</button>
  <button class="evt-btn" data-evt="UR Series">⚡ UR Series</button>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-chip">
    <div class="stat-n" id="statConfirmed">—</div>
    <div class="stat-l">Confirmados<br>hoje</div>
  </div>
  <div class="stat-div"></div>
  <div class="stat-chip">
    <div class="stat-n" id="statTotal">—</div>
    <div class="stat-l">Atletas<br>na liga</div>
  </div>
  <div class="stat-div"></div>
  <div class="stat-chip">
    <div class="stat-n" id="statEvent" style="font-size:16px;color:var(--muted)">UR Play</div>
    <div class="stat-l">Evento<br>ativo</div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" id="searchInput" type="text" placeholder="Buscar seu nome..." autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<!-- LIST -->
<div class="list-wrap">
  <div class="list-count">
    <span id="listCount">Carregando...</span>
    <button class="refresh-btn" id="refreshBtn">↺ Atualizar</button>
  </div>
  <div id="athleteList">
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Carregando atletas...</p>
    </div>
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
  <div class="success-name" id="successName"></div>
  <div class="success-level" id="successLevel"></div>
  <div class="success-msg">Check-in confirmado!</div>
  <button class="success-close" id="successClose">Fechar</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SB_URL  = "https://ongicywqaeedgzblllus.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZ2ljeXdxYWVlZGd6YmxsbHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjY5NTYsImV4cCI6MjA5NDM0Mjk1Nn0.UtVWQPL88y5-KR-qtttqnrOwG7_MtfWV-V_enmABCso";
const HEADERS = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" };
const TODAY   = new Date().toISOString().split("T")[0];

let athletes   = [];
let checkins   = {};      // athleteId → { checked_in_at }
let activeEvt  = "UR Play";
let searching  = false;

// ── DATE HEADER ──
(function(){
  const d = new Date();
  const opts = { weekday:"short", day:"2-digit", month:"short" };
  document.getElementById("headerDate").textContent = d.toLocaleDateString("pt-BR", opts).toUpperCase();
})();

// ── TOAST ──
function toast(msg, dur=2600){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), dur);
}

// ── SUPABASE HELPERS ──
async function sbGet(path){
  const r = await fetch(SB_URL + path, { headers: HEADERS });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(path, body){
  const r = await fetch(SB_URL + path, { method:"POST", headers: {...HEADERS, "Prefer":"resolution=merge-duplicates,return=minimal"}, body: JSON.stringify(body) });
  return r;
}

// ── LOAD ATHLETES ──
async function loadAthletes(){
  try {
    const rows = await sbGet("/rest/v1/ur_backups?id=eq.main&select=data&limit=1");
    if(!rows?.length || !rows[0].data) return [];
    const state = JSON.parse(rows[0].data);
    return (state.athletes || []).filter(a => a.name && a.name.trim()).sort((a,b) => a.name.localeCompare(b.name, "pt-BR"));
  } catch(e) {
    console.error("loadAthletes:", e);
    return [];
  }
}

// ── LOAD TODAY'S CHECK-INS ──
async function loadCheckins(){
  try {
    const rows = await sbGet(`/rest/v1/ur_checkins?event_date=eq.${TODAY}&event_type=eq.${encodeURIComponent(activeEvt)}&select=athlete_id,athlete_name,checked_in_at`);
    const map = {};
    (rows || []).forEach(r => { map[r.athlete_id] = r; });
    return map;
  } catch(e) {
    console.error("loadCheckins:", e);
    return {};
  }
}

// ── LEVEL BADGE ──
const LEVEL_NAMES = { NI:"Indefinido", N5:"Iniciante", N4:"Hunter", N3:"Experiente", N2:"Elite", N1:"Lenda" };
function levelBadge(lvl){
  const name = LEVEL_NAMES[lvl] || lvl || "—";
  return `<span class="lvl-badge lv-${lvl||"NI"}">${lvl||"NI"} · ${name}</span>`;
}

// ── RENDER LIST ──
function renderList(filter=""){
  const q = filter.toLowerCase().trim();
  const filtered = q ? athletes.filter(a => a.name.toLowerCase().includes(q)) : athletes;
  const total = filtered.length;
  const confirmed = Object.keys(checkins).length;

  document.getElementById("statConfirmed").textContent = confirmed;
  document.getElementById("statTotal").textContent = athletes.length;
  document.getElementById("statEvent").textContent = activeEvt;
  document.getElementById("listCount").textContent = q
    ? `${total} resultado${total !== 1 ? "s" : ""} para "${filter}"`
    : `${total} atleta${total !== 1 ? "s" : ""}`;

  if(!total){
    document.getElementById("athleteList").innerHTML = `
      <div class="state-msg">
        <div class="icon">🔍</div>
        <h3>Nenhum atleta</h3>
        <p>${q ? "Tente outro nome." : "Nenhum atleta cadastrado na liga ainda."}</p>
      </div>`;
    return;
  }

  document.getElementById("athleteList").innerHTML = filtered.map(a => {
    const ci = checkins[a.id];
    const done = !!ci;
    const time = ci ? new Date(ci.checked_in_at).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) : "";
    const initials = a.name.split(" ").slice(0,2).map(n=>n[0]).join("").toUpperCase();
    return `
    <div class="ath-card${done?" done":""}" id="card-${a.id}">
      <div class="ath-avatar">${initials}</div>
      <div class="ath-info">
        <div class="ath-name">${a.name}</div>
        <div class="ath-meta">
          ${levelBadge(a.level)}
          ${done ? `<span class="ath-time">✓ ${time}</span>` : ""}
        </div>
      </div>
      <button class="ci-btn" id="btn-${a.id}"
        ${done ? 'disabled' : `onclick="doCheckin('${a.id}','${a.name.replace(/'/g,"\\'")}','${a.level||"NI"}')"`}>
        ${done ? "✓ OK" : "Check-in"}
      </button>
    </div>`;
  }).join("");
}

// ── DO CHECK-IN ──
async function doCheckin(id, name, level){
  const btn = document.getElementById("btn-"+id);
  if(!btn || btn.disabled) return;
  btn.disabled = true;
  btn.classList.add("loading");
  btn.textContent = "...";

  try {
    const r = await sbPost("/rest/v1/ur_checkins", {
      athlete_id: id,
      athlete_name: name,
      event_date: TODAY,
      event_type: activeEvt,
      level: level,
      checked_in_at: new Date().toISOString()
    });

    if(r.ok || r.status === 201 || r.status === 204){
      checkins[id] = { checked_in_at: new Date().toISOString() };
      showSuccess(name, level);
      renderList(document.getElementById("searchInput").value);
    } else {
      const err = await r.text();
      if(err.includes("duplicate") || err.includes("unique")){
        checkins[id] = { checked_in_at: new Date().toISOString() };
        renderList(document.getElementById("searchInput").value);
        toast("✅ " + name.split(" ")[0] + " já está confirmado hoje!");
      } else {
        btn.disabled = false;
        btn.classList.remove("loading");
        btn.textContent = "Check-in";
        toast("Erro ao confirmar. Tente novamente.");
      }
    }
  } catch(e) {
    btn.disabled = false;
    btn.classList.remove("loading");
    btn.textContent = "Check-in";
    toast("Sem conexão. Verifique o Wi-Fi.");
  }
}

// ── SUCCESS OVERLAY ──
function showSuccess(name, level){
  document.getElementById("successName").textContent = name.split(" ")[0].toUpperCase();
  document.getElementById("successLevel").innerHTML = levelBadge(level);
  document.getElementById("successOverlay").classList.add("show");
  navigator.vibrate && navigator.vibrate([80, 40, 80]);
}
document.getElementById("successClose").onclick = () => {
  document.getElementById("successOverlay").classList.remove("show");
};

// ── EVENT SELECTOR ──
document.querySelectorAll(".evt-btn").forEach(btn => {
  btn.addEventListener("click", async () => {
    document.querySelectorAll(".evt-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeEvt = btn.dataset.evt;
    checkins = await loadCheckins();
    renderList(document.getElementById("searchInput").value);
  });
});

// ── SEARCH ──
document.getElementById("searchInput").addEventListener("input", e => {
  renderList(e.target.value);
});

// ── REFRESH ──
document.getElementById("refreshBtn").addEventListener("click", async () => {
  document.getElementById("refreshBtn").textContent = "↺ Atualizando...";
  checkins = await loadCheckins();
  renderList(document.getElementById("searchInput").value);
  document.getElementById("refreshBtn").textContent = "↺ Atualizar";
  toast("Lista atualizada!");
});

// ── INIT ──
async function init(){
  document.getElementById("athleteList").innerHTML = `
    <div class="state-msg"><div class="spinner"></div><p>Carregando atletas...</p></div>`;
  [athletes, checkins] = await Promise.all([loadAthletes(), loadCheckins()]);
  if(!athletes.length){
    document.getElementById("athleteList").innerHTML = `
      <div class="state-msg">
        <div class="icon">⚠️</div>
        <h3>Sem atletas</h3>
        <p>Sincronize o sistema com o Supabase primeiro para que os atletas apareçam aqui.</p>
      </div>`;
    document.getElementById("listCount").textContent = "0 atletas";
    document.getElementById("statTotal").textContent = "0";
    document.getElementById("statConfirmed").textContent = "0";
    return;
  }
  renderList();
}

init();
</script>
</body>
</html>
