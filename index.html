          <button class="btn" id="cancelEditPlanBtn">Cancelar</button>
        </div>
      </div>`;
      document.body.appendChild(overlay);

      document.getElementById("cancelEditPlanBtn").onclick = () => overlay.remove();
      document.getElementById("editPlanName").focus();
      document.getElementById("saveEditPlanBtn").onclick = () => {
        const name = document.getElementById("editPlanName").value.trim();
        const price = parseFloat(document.getElementById("editPlanPrice").value);
        const desc = document.getElementById("editPlanDesc").value.trim();
        if(!name || isNaN(price) || price<=0) return toast("Preencha nome e preço válido.");
        plan.name = name; plan.price = price; plan.description = desc;
        saveState(); overlay.remove(); toast("Plano atualizado ✓"); render();
      };
    }

              <div class="field"><label>Categoria</label><select id="finRevCat">${revenueCategories.map(c=>`<option>${c}</option>`).join("")}</select></div>
              <div class="field"><label>Data</label><input id="finRevDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>

              <div class="field"><label>Categoria</label><select id="finExpCat">${expenseCategories.map(c=>`<option>${c}</option>`).join("")}</select></div>
              <div class="field"><label>Data</label><input id="finExpDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
              <button class="btn danger" id="finExpBtn">Registrar despesa</button>

          <div class="panel span-4">

              <div class="row"><div class="grow"><div class="title">Despesa Total</div></div><div class="score">${brl(m.totalExp)}</div></div>
              <div class="row"><div class="grow"><div class="title">Lucro Total</div></div><div class="score" style="color:${m.totalProfit>=0?"#6f5":"#f65"}">${brl(m.totalProfit)}</div></div>
              <div class="row"><div class="grow"><div class="title">ARPU Mensal</div><div class="sub">Receita por atleta</div></div><div class="score">${brl(m.monthRev/Math.max(state.athletes.length,1))}</div></div>
              <div class="row"><div class="grow"><div class="title">CAC Marketing</div><div class="sub">Custo de aquisição</div></div><div class="score">${brl(m.cac/Math.max(state.athletes.length,1))}</div></div>

          </div>
          ${finGoalPanel(f, m)}
          ${finOverduePanel(f)}
          <div class="panel span-6">
            <h2>Planos de Assinatura</h2>

              <div class="row" style="gap:6px">
                <div class="grow"><div class="title">${esc(p.name)}</div><div class="sub">${esc(p.description||"")}</div></div>
                <div class="score" style="min-width:70px">${brl(p.price)}<div class="sub" style="color:${p.active?"#4caf50":"var(--muted)"}">${p.active?"Ativo":"Pausado"}</div></div>
                <button class="btn icon" data-edit-plan="${p.id}" title="Editar plano" style="padding:5px 8px;font-size:13px">✏️</button>
                <button class="btn icon" data-toggle-plan="${p.id}" title="${p.active?"Pausar":"Ativar"}" style="padding:5px 8px;font-size:13px">${p.active?"⏸":"▶"}</button>
                <button class="btn icon" data-delete-plan="${p.id}" title="Excluir plano" style="padding:5px 8px;font-size:13px;color:#f65">🗑</button>
              </div>`).join("")||'<div class="empty">Nenhum plano cadastrado.</div>'}

            <div class="form" style="margin-top:10px">
              <div class="field"><label>Plano</label><input id="subPlanName" placeholder="Nome do plano"></div>

              <div class="field full"><label>Descrição</label><input id="subPlanDesc" placeholder="Benefícios incluídos"></div>
              <button class="btn primary" id="addSubPlanBtn">Adicionar plano</button>
            </div>
          </div>
          <div class="panel span-6">
            <h2>Assinaturas de Atletas</h2>
            <div class="form" style="margin-bottom:10px">
              <div class="field"><label>Atleta</label><select id="subAthlete"><option value="">Selecione</option>${state.athletes.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join("")}</select></div>
              <div class="field"><label>Plano</label><select id="subPlan"><option value="">Selecione</option>${f.subscriptionPlans.filter(p=>p.active).map(p=>`<option value="${p.id}">${esc(p.name)} - ${brl(p.price)}</option>`).join("")}</select></div>
              <div class="field"><label>Validade</label><input id="subExpiry" type="date"></div>
              <button class="btn primary" id="addSubBtn">Vincular assinatura</button>
            </div>
            <div class="list">${f.athleteSubscriptions.slice(0,8).map(s=>{
              const a=athleteById(s.athleteId);
              const plan=f.subscriptionPlans.find(p=>p.id===s.planId);
              const isLate=s.active&&s.expiry&&s.expiry<today;
              const lateBadge = isLate ? ' <span class="chip red" style="font-size:9px">VENCIDA</span>' : "";
              return `<div class="row"><div class="grow"><div class="title">${esc(a?.name||"Atleta")}${lateBadge}</div><div class="sub">${esc(plan?.name||"Plano")} | até ${s.expiry||"indeterminado"}</div></div><div class="score" style="color:${s.active?(isLate?"#f65":"#f1d878"):"var(--muted)"}">${s.active?(isLate?"Vencida":"Ativo"):"Expirado"}</div></div>`;
            }).join("")||'<div class="empty">Nenhuma assinatura ativa.</div>'}
            </div>
          </div>
          ${finTransactionPanel(f)}
          <div class="panel span-12">
            <h2>Patrocinadores e Parceiros</h2>
            <div class="form" style="margin-bottom:10px">
              <div class="field"><label>Empresa</label><input id="sponsorName" placeholder="Nome do patrocinador"></div>
              <div class="field"><label>Valor Mensal R$</label><input id="sponsorAmount" type="number" min="0"></div>
              <div class="field"><label>Tipo</label><select id="sponsorType"><option>Patrocínio</option><option>Permuta</option><option>Parceria</option><option>Mídia</option></select></div>
              <div class="field"><label>Contato</label><input id="sponsorContact" placeholder="WhatsApp ou e-mail"></div>
              <button class="btn primary" id="addSponsorBtn">Adicionar parceiro</button>
            </div>
            <div class="list">${f.sponsors.map(s=>`
              <div class="row"><div class="avatar">S</div><div class="grow"><div class="title">${esc(s.name)}</div><div class="chips">${chip(s.type,"blue")}${chip(s.contact||"")}</div></div><div class="score">${brl(s.amount)}<div class="sub">por mês</div></div><button class="btn small danger" data-remove-sponsor="${s.id}">Remover</button></div>`).join("")||`<div class="empty">Nenhum patrocinador cadastrado. Patrocínios são a principal fonte de receita escalável.</div>`}
            </div>
          </div>
        </div>`;
      setTimeout(()=>drawCashFlowChart(), 0);
      document.getElementById("finRevBtn").onclick = () => {
        const desc = document.getElementById("finRevDesc").value.trim();
        const amount = parseFloat(document.getElementById("finRevAmount").value);
        if(!desc || !amount) return toast("Preencha descrição e valor.");
        state.finance.revenues.push({id:uid(), description:desc, amount, category:document.getElementById("finRevCat").value, date:document.getElementById("finRevDate").value});
        toast("Receita registrada."); render();
      };
      document.getElementById("finExpBtn").onclick = () => {
        const desc = document.getElementById("finExpDesc").value.trim();
        const amount = parseFloat(document.getElementById("finExpAmount").value);
        if(!desc || !amount) return toast("Preencha descrição e valor.");
        state.finance.expenses.push({id:uid(), description:desc, amount, category:document.getElementById("finExpCat").value, date:document.getElementById("finExpDate").value});
        toast("Despesa registrada."); render();
      };
      document.getElementById("addSubPlanBtn").onclick = () => {
        const name = document.getElementById("subPlanName").value.trim();
        const price = parseFloat(document.getElementById("subPlanPrice").value);
        const desc = document.getElementById("subPlanDesc").value.trim();
        if(!name || !price) return toast("Preencha nome e preço.");
        state.finance.subscriptionPlans.push({id:uid(), name, price, description:desc, active:true});
        toast("Plano adicionado."); render();
      };
      document.getElementById("addSubBtn").onclick = () => {
        const athleteId = document.getElementById("subAthlete").value;
        const planId = document.getElementById("subPlan").value;
        const expiry = document.getElementById("subExpiry").value;
        if(!athleteId || !planId) return toast("Selecione atleta e plano.");
        state.finance.athleteSubscriptions.push({id:uid(), athleteId, planId, expiry, active:true, createdAt:new Date().toISOString()});
        toast("Assinatura vinculada."); render();
      };
      document.getElementById("addSponsorBtn").onclick = () => {
        const name = document.getElementById("sponsorName").value.trim();
        const amount = parseFloat(document.getElementById("sponsorAmount").value||0);
        if(!name) return toast("Informe o nome do patrocinador.");
        state.finance.sponsors.push({id:uid(), name, amount, type:document.getElementById("sponsorType").value, contact:document.getElementById("sponsorContact").value.trim()});
        toast("Parceiro adicionado."); render();
      };
      document.getElementById("saveGoalBtn").onclick = () => {
        const v = parseFloat(document.getElementById("finGoalInput").value);
        if(v>0){state.finance.monthlyGoal=v; toast("Meta atualizada."); render();}
      };
      document.getElementById("finGenReportBtn").onclick = () => {
        showFinancialReportModal(generateFinancialReport());
      };
      const finRenewAllBtn = document.getElementById("finRenewAllBtn");
      if(finRenewAllBtn) finRenewAllBtn.onclick = () => {
        const t=new Date().toISOString().slice(0,10);
        let cnt=0;
        state.finance.athleteSubscriptions.forEach(s=>{
          if(s.active&&s.expiry&&s.expiry<t){
            const d=new Date(t+"T00:00:00"); d.setDate(d.getDate()+30);
            s.expiry=d.toISOString().slice(0,10); cnt++;
          }
        });
        toast(`${cnt} assinatura(s) renovada(s) por 30 dias.`); render();
      };
      document.querySelectorAll("[data-renew-sub]").forEach(btn=>btn.onclick=()=>{
        const s=state.finance.athleteSubscriptions.find(x=>x.id===btn.dataset.renewSub);
        if(!s) return;
        const base=s.expiry&&s.expiry>new Date().toISOString().slice(0,10)?s.expiry:new Date().toISOString().slice(0,10);
        const d=new Date(base+"T00:00:00"); d.setDate(d.getDate()+30);
        s.expiry=d.toISOString().slice(0,10); s.active=true;
        toast("Renovado por 30 dias."); render();
      });
      document.querySelectorAll("[data-expire-sub]").forEach(btn=>btn.onclick=()=>{
        const s=state.finance.athleteSubscriptions.find(x=>x.id===btn.dataset.expireSub);
        if(s){s.active=false; toast("Assinatura expirada."); render();}
      });
      document.querySelectorAll("[data-remove-tx]").forEach(btn=>btn.onclick=()=>{
        const id=btn.dataset.removeTx, type=btn.dataset.removeTxType;
        if(type==="revenue") state.finance.revenues=state.finance.revenues.filter(r=>r.id!==id);
        else state.finance.expenses=state.finance.expenses.filter(e=>e.id!==id);
        toast("Transação removida."); render();
      });
      document.querySelectorAll("[data-remove-sponsor]").forEach(btn=>btn.onclick=()=>{
        state.finance.sponsors=state.finance.sponsors.filter(s=>s.id!==btn.dataset.removeSponsor);
        render();
      });
      // Editar / Pausar / Excluir planos de assinatura
      document.querySelectorAll("[data-edit-plan]").forEach(btn=>btn.onclick=()=>{
        showEditPlanModal(btn.dataset.editPlan);
      });
      document.querySelectorAll("[data-toggle-plan]").forEach(btn=>btn.onclick=()=>{
        const plan=state.finance.subscriptionPlans.find(p=>p.id===btn.dataset.togglePlan);
        if(plan){ plan.active=!plan.active; saveState(); toast(plan.active?"Plano ativado ✓":"Plano pausado."); render(); }
      });
      document.querySelectorAll("[data-delete-plan]").forEach(btn=>btn.onclick=()=>{
        const plan=state.finance.subscriptionPlans.find(p=>p.id===btn.dataset.deletePlan);
        if(!plan) return;
        if(!confirm(`Excluir o plano "${plan.name}"?\nEsta ação não pode ser desfeita.`)) return;
        state.finance.subscriptionPlans=state.finance.subscriptionPlans.filter(p=>p.id!==btn.dataset.deletePlan);
        saveState(); toast("Plano excluído."); render();
      });
      bindTxFilter();
    }

    function getMissionProgress(athleteId, mission){
      const a = athleteById(athleteId);
      if(!a) return {done:false, progress:0, total:mission.condition.value||1};
      let progress = 0;
      if(mission.type==="stats") progress = a.stats[mission.condition.field] || 0;
      else if(mission.type==="presences") progress = a.presences || 0;
      else if(mission.type==="pts") progress = a.pts || 0;
      else if(mission.type==="coins") progress = a.coins || 0;
      const total = mission.condition.value || 1;
      const done = progress >= total;
      return {done, progress, total, pct:Math.min(100, Math.round(progress/total*100))};
    }
    function checkAndAwardMissions(){
      if(!state.missions || !state.missions.length) state.missions = defaultMissions;
      let awarded = 0;
      state.athletes.forEach(a => {
        state.missions.forEach(m => {
          const already = (state.missionProgress||[]).some(mp=>mp.athleteId===a.id && mp.missionId===m.id && mp.done);
          if(already) return;
          const prog = getMissionProgress(a.id, m);
          if(prog.done){
            a.pts += m.pts;
            a.coins += m.coins;
            state.missionProgress = state.missionProgress || [];
            state.missionProgress.push({id:uid(), athleteId:a.id, missionId:m.id, done:true, awardedAt:new Date().toISOString()});
            awarded++;
          }
        });
      });
      if(awarded > 0){ toast(`🎯 ${awarded} missão(ões) concluída(s)! Pontos e coins atribuídos.`); }
      return awarded;
    }

      if(!el) return;

      el.innerHTML = `

          ${metric("Missões", missions.length, "", "blue")}

        </div>
        <div class="panel" style="margin-bottom:12px">
          <h2>Verificar & Atribuir Missões</h2>

          <button class="btn gold" id="checkMissionsBtn">🎯 Verificar Missões Agora</button>
        </div>
        <div class="grid">
          ${categories.map(cat=>{
            const catMissions = missions.filter(m=>m.category===cat);
            return `<div class="panel span-6">
              <h2>${cat}</h2>
              <div class="list">${catMissions.map(m=>{
                const athletesDone = state.athletes.filter(a=>getMissionProgress(a.id,m).done);
                const inProgress = state.athletes.filter(a=>{const p=getMissionProgress(a.id,m);return !p.done&&p.progress>0;});
                return `<div class="row">
                  <div class="avatar" style="font-size:18px;background:transparent">${m.icon}</div>
                  <div class="grow">
                    <div class="title">${esc(m.name)} ${chip(m.rarity, rarityColor[m.rarity]||"")}</div>

                    ${inProgress.length ? `<div class="sub" style="margin-top:4px">Em progresso: ${esc(inProgress.slice(0,3).map(a=>{const p=getMissionProgress(a.id,m);return a.name+" ("+p.progress+"/"+p.total+")"}).join(", "))}</div>` : ""}
                  </div>
                </div>`;
              }).join("")}
            </div>`;
          }).join("")}
          <div class="panel span-12">
            <h2>Progresso por Atleta</h2>
            <div class="table-wrap"><table>
              <thead><tr><th>Atleta</th><th>Missões Concluídas</th><th>Em Progresso</th><th>Pendentes</th><th>Pts Ganhos</th></tr></thead>
              <tbody>${state.athletes.map(a=>{
                const done = missions.filter(m=>getMissionProgress(a.id,m).done);
                const inProg = missions.filter(m=>{const p=getMissionProgress(a.id,m);return !p.done&&p.progress>0;});
                const pending = missions.filter(m=>getMissionProgress(a.id,m).progress===0);
                const ptsEarned = done.reduce((s,m)=>s+m.pts,0);
                return `<tr>
                  <td><strong>${esc(a.name)}</strong></td>

                </tr>`;
              }).join("")}
              </tbody>
            </table></div>
          </div>
        </div>`;
      document.getElementById("checkMissionsBtn").onclick = () => { const n = checkAndAwardMissions(); if(n===0) toast("Nenhuma missão nova concluída ainda."); render(); };

    function drawURGradientBg(ctx, w, h){
      const grad = ctx.createLinearGradient(0,0,w,h);
      grad.addColorStop(0,"#030405");
      grad.addColorStop(0.5,"#08090d");
      grad.addColorStop(1,"#100e00");
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,w,h);
      // Grid lines
      ctx.strokeStyle = "rgba(255,210,31,0.04)";
      ctx.lineWidth = 1;
      for(let x=0;x<w;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
      for(let y=0;y<h;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      // Glow top left
      const glow = ctx.createRadialGradient(w*0.1,0,0,w*0.1,0,w*0.4);
      glow.addColorStop(0,"rgba(255,210,31,0.12)");
      glow.addColorStop(1,"transparent");
      ctx.fillStyle = glow;
      ctx.fillRect(0,0,w,h);
    }
    function drawURLogo(ctx, x, y, size){
      ctx.font = `900 ${size}px 'Barlow Condensed', sans-serif`;
      ctx.fillStyle = "#ffd21f";
      ctx.textAlign = "left";
      ctx.fillText("UR", x, y);
    }
    function generateRankingCanvas(){
      const canvas = document.getElementById("rankingCanvas");
      if(!canvas) return;
      const ctx = canvas.getContext("2d");
      const W = 1080, H = 1080;
      drawURGradientBg(ctx, W, H);
      // Gold bottom bar
      const bar = ctx.createLinearGradient(0,0,W,0);
      bar.addColorStop(0,"transparent");
      bar.addColorStop(0.3,"#c9a84c");
      bar.addColorStop(0.7,"#ffd84d");
      bar.addColorStop(1,"transparent");
      ctx.fillStyle = bar;
      ctx.fillRect(0, H-6, W, 6);
      // Header
      drawURLogo(ctx, 60, 120, 72);
      ctx.font = "700 32px 'Barlow', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.textAlign = "left";
      ctx.fillText("ULTIMATE RIVALS — SISTEMA PRO", 60, 160);
      ctx.font = "900 80px 'Barlow Condensed', sans-serif";
      ctx.fillStyle = "#ffd21f";
      ctx.fillText("RANKING — SEMANA " + state.week, 60, 260);
      ctx.font = "700 36px 'Barlow', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.fillText(esc(state.season).toUpperCase(), 60, 310);
      // Divider
      ctx.fillStyle = "#c9a84c";
      ctx.fillRect(60, 340, W-120, 2);
      // Top athletes
      const top = sortedAthletes().slice(0,5);
      const medals = ["🥇","🥈","🥉","4","5"];
      const medalColors = ["#ffd21f","#c0c0c0","#cd7f32","rgba(255,255,255,0.4)","rgba(255,255,255,0.3)"];
      top.forEach((a, i) => {
        const y = 380 + i*120;
        const isFirst = i === 0;
        if(isFirst){
          ctx.fillStyle = "rgba(255,210,31,0.08)";
          ctx.beginPath();
          ctx.roundRect(50, y-18, W-100, 100, 14);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,210,31,0.3)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        // Position circle
        ctx.fillStyle = medalColors[i];
        ctx.beginPath();
        ctx.arc(120, y+32, 36, 0, Math.PI*2);
        ctx.fill();
        ctx.font = `900 ${isFirst?36:28}px 'Barlow Condensed', sans-serif`;
        ctx.fillStyle = isFirst ? "#030405" : "#fff";
        ctx.textAlign = "center";
        ctx.fillText(String(i+1), 120, y+42);
        // Name
        ctx.textAlign = "left";
        ctx.font = `${isFirst?"900":"700"} ${isFirst?58:46}px 'Barlow Condensed', sans-serif`;
        ctx.fillStyle = isFirst ? "#ffd21f" : "#e8e3d4";
        ctx.fillText(esc(a.name).toUpperCase(), 180, y+48);
        // Level chip
        ctx.font = "700 22px 'Barlow', sans-serif";
        ctx.fillStyle = "rgba(255,210,31,0.5)";
        ctx.fillText(a.level, 180, y+80);
        // Score
        ctx.textAlign = "right";
        ctx.font = `900 ${isFirst?64:52}px 'Barlow Condensed', sans-serif`;
        ctx.fillStyle = isFirst ? "#ffd21f" : "#e8e3d4";
        ctx.fillText(money(a.pts)+" pts", W-80, y+52);
        ctx.font = "600 24px 'Barlow', sans-serif";
        ctx.fillStyle = "rgba(255,210,31,0.5)";
        ctx.fillText(money(a.coins)+" coins", W-80, y+84);
        ctx.textAlign = "left";
      });
      // Footer
      ctx.font = "600 28px 'Barlow', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.textAlign = "center";
      ctx.fillText("#UltimateRivals  #VoleiAmador  #URRanking", W/2, H-40);
    }

    function generateSwissRound1(teams){
      const shuffled = [...teams].sort(()=>Math.random()-0.5);
      const pairs = [];
      for(let i=0;i<shuffled.length-1;i+=2){
        pairs.push({id:uid(), teamA:shuffled[i].id, teamB:shuffled[i+1].id, scoreA:0, scoreB:0, done:false});
      }
      return [{round:1, pairs}];
    }

    async function supabaseSyncData(){
      const intg = state.integrations;
      if(!intg?.supabase?.url || !intg?.supabase?.key){
        return toast("Configure URL e Key do Supabase primeiro.");
      }
      toast("Sincronizando com Supabase...");
      try {
        const payload = {
          season: state.season,
          week: state.week,
          athletes_count: state.athletes.length,
          events_count: state.events.length,
          data: JSON.stringify(state),
          synced_at: new Date().toISOString()
        };
        const res = await fetch(`${intg.supabase.url}/rest/v1/ur_backups`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": intg.supabase.key,
            "Authorization": "Bearer " + intg.supabase.key,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify(payload)
        });
        if(res.ok || res.status === 201){
          intg.supabase.connected = true;
          intg.supabase.lastSync = new Date().toLocaleString("pt-BR");
          toast("✅ Dados sincronizados com Supabase!");
        } else {
          const err = await res.text();
          toast("Erro Supabase: " + (err.slice(0,80)||res.status) + " — Verifique se a tabela 'ur_backups' existe.");
        }
      } catch(e) {
        toast("Erro de conexão: " + (e.message||"verifique a URL e Key."));
      }
      render();
    }

      state.events.forEach(e => row(e.id,labelEventType(e.type)+(e.quick?" rapido":""),e.week,e.mode||"-",e.quick?(e.teamAName||""):(e.type==="ct"?"":(teamById(e.teamA)?.name||"")),e.quick?(e.pointsA||""):(e.type==="ct"?"":(e.setsA||"")),e.quick?(e.teamBName||""):(e.type==="ct"?"":(teamById(e.teamB)?.name||"")),e.quick?(e.pointsB||""):(e.type==="ct"?"":(e.setsB||"")),e.points||"",e.coins||"",e.date?new Date(e.date).toLocaleString("pt-BR"):""));
      lines.push("");
      // Torneios
      if(state.tournaments.length){
        lines.push("ABA: TORNEIOS");

          const isGroup = m.phase.startsWith("Grupo");
          const winner = m.status==="done" ? teamById(isGroup ? (m.pointsA > m.pointsB ? m.teamA : m.teamB) : (m.setsA > m.setsB ? m.teamA : m.teamB))?.name : "";
          row(t.name,m.phase,isGroup?m.phase.replace("Grupo ",""):"",m.court||"",teamById(m.teamA)?.name||"",teamById(m.teamB)?.name||"",m.pointsA||"",m.pointsB||"",m.setsA||"",m.setsB||"",m.status,winner||"");
        }));
        lines.push("");

        state.tournaments.forEach(t=>{

      lines.push("");
      lines.push("ABA: MERCADO");

      state.prizes.forEach(p=>row(p.id,p.name,p.category,p.cost,p.realCost,p.promoCost,p.stock,p.partner,p.active?"Sim":"Nao",p.notes||""));

      const lvlRows = levelingRows();
      lvlRows.forEach((r,i)=>{const sug=levelSuggestion(r,i,lvlRows);row(r.a.name,r.a.level,r.score.total,r.score.technical,r.score.result,r.score.attendance,r.score.evolution,sug.action,sug.target,sug.reason)});
      const dateStr = new Date().toLocaleDateString("pt-BR").replace(/\//g,"-");
      downloadText("UR-planilha-mestre-" + dateStr + ".csv", lines.join("\n"), "text/csv;charset=utf-8");
    }
    function exportData(){
      const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      const dateStr = new Date().toLocaleDateString("pt-BR").replace(/\//g,"-");
      a.download = "UR-backup-" + dateStr + "-s" + state.week + ".json";

    function runFullSimulation(){
      state = normalizeState({week:5, season:"Simulacao UR - Trimestre Maio", athletes:[], teams:[], events:[], calendar:null, leveling:null, tournaments:[], redemptions:[], prizes:defaultPrizes, rules:{...defaultRules}});

      const idByName = n => state.athletes.find(a=>a.name===n)?.id;
      const makeTeam = (name,category,division,players,reserves=[],modalities=["areia"],notes="") => state.teams.push({id:uid(),name,category,division,modalities,notes,players:players.map(idByName).filter(Boolean),reserves:reserves.map(idByName).filter(Boolean),record:{w:0,l:0,setsW:0,setsL:0,rk:0}});
      makeTeam("Areal Pro","DX","N2",["Ana Costa","Bruno Lima"],["Felipe Rocha"]); makeTeam("Linha Forte","DX","N1",["Carol Reis","Diego Alves"]); makeTeam("Base UR","DX","N3",["Erika Melo","Felipe Rocha"],["Marina Souza"]); makeTeam("BH Quartet","QX","N2",["Ana Costa","Bruno Lima","Gi Lima","Henrique Torres"]); makeTeam("Contagem Queens","QF","N2",["Carol Reis","Isabela Nunes","Karen Alves"],[],["areia","4x4"],"equipe incompleta para teste"); makeTeam("Betim Kings","QM","N3",["Joao Pedro","Leo Martins","Nando Freitas","Paulo Dias"]); makeTeam("Equipe Aberta 01","DX","N3",["Marina Souza"],[],["areia","avulso"],"cadastro incompleto");
      const team = n => state.teams.find(t=>t.name===n);
      const applyMatch = (type,mode,aName,bName,aScore,bScore,week) => {
        const teamA = team(aName), teamB = team(bName), aWon = aScore > bScore, evId = uid(); let totalPts = 0, totalCoins = 0; const playerDeltas = {}, teamDeltas = {};
        [teamA,teamB].forEach(t=>{const won=t.id===teamA.id?aWon:!aWon; const rk=won?2:.5; const setsW=won?1:0, setsL=won?0:1; t.record.w+=won?1:0; t.record.l+=won?0:1; t.record.setsW+=setsW; t.record.setsL+=setsL; t.record.rk+=rk; teamDeltas[t.id]={w:won?1:0,l:won?0:1,setsW,setsL,rk}});
        [...teamA.players,...teamB.players].filter(Boolean).forEach((pid,i)=>{const a=athleteById(pid), inA=teamA.players.includes(pid), won=inA?aWon:!aWon; const st={points:2+(i%4),aces:i%2,attacks:2+(i%3),attackAttempts:4+(i%4),assists:i%3,blocks:i%2,digs:2+(i%3),run3:i%5===0?1:0,run5:0,clutch:i%4===0?1:0,comeback:won&&Math.abs(aScore-bScore)<=3?1:0,mvp:i===0}; const calc=calcPlayerPoints(a,won,0,st); a.pts+=calc.pts; a.coins+=calc.coins; a.presences++; a.streak++; a.wins+=won?1:0; a.losses+=won?0:1; a.mvps+=st.mvp?1:0; Object.assign(a.stats,{aces:a.stats.aces+calc.aces,attacks:a.stats.attacks+calc.attacks,attackAttempts:a.stats.attackAttempts+calc.attackAttempts,serveAttempts:a.stats.serveAttempts+calc.serveAttempts,blocks:a.stats.blocks+calc.blocks,digs:a.stats.digs+calc.digs,points:a.stats.points+calc.points,assists:a.stats.assists+calc.assists,run3:a.stats.run3+calc.run3,run5:a.stats.run5+calc.run5,clutch:a.stats.clutch+calc.clutch,comeback:a.stats.comeback+calc.comeback}); a.history.push({eventId:evId,week,type,mode,pts:calc.pts,coins:calc.coins,won,points:calc.points,aces:calc.aces,attacks:calc.attacks,attackAttempts:calc.attackAttempts,efficiency:calc.attackAttempts?Math.round(calc.attacks/calc.attackAttempts*100):0,assists:calc.assists,blocks:calc.blocks,digs:calc.digs,run3:calc.run3,run5:calc.run5,clutch:calc.clutch,comeback:calc.comeback}); playerDeltas[pid]={pts:calc.pts,coins:calc.coins,presences:1,streak:1,wins:won?1:0,losses:won?0:1,mvps:st.mvp?1:0,fairplays:0,aces:calc.aces,attacks:calc.attacks,attackAttempts:calc.attackAttempts,serveAttempts:calc.serveAttempts,blocks:calc.blocks,digs:calc.digs,points:calc.points,assists:calc.assists,run3:calc.run3,run5:calc.run5,clutch:calc.clutch,comeback:calc.comeback}; totalPts+=calc.pts; totalCoins+=calc.coins;});

      const tour = {id:uid(),name:"Simulacao Mini Torneio 24",type:"mini",category:"DX",week:4,phases:defaultPhases,groups:{A:state.teams.slice(0,4).map(t=>t.id),B:state.teams.slice(3,7).map(t=>t.id)},matches:[],format:{groupSetPoints:18,finalSets:2,tiebreak:["Vitorias","Saldo de pontos","Pontos pro","Confronto direto","Sorteio/decisao da organizacao"]},createdAt:new Date().toISOString()};
      state.tournaments.push(tour); generateGroupMatches(tour.id); tour.matches.slice(0,6).forEach((m,i)=>{m.pointsA=18; m.pointsB=12+i%5; m.status="done"; m.court="Q"+(i+1)}); generateFinalMatches(tour.id);
      const felipe = state.athletes.find(a=>a.name==="Felipe Rocha"); state.leveling.history.push({id:uid(),athleteId:felipe?.id,name:"Felipe Rocha",from:"NI",to:"N3",action:"Definir nivel",reason:"Simulacao apos primeiro UR Play",score:felipe?levelingScore(felipe).total:0,date:new Date().toISOString()});
      const totalsNow = totals(); state.simulationReport = {date:new Date().toISOString(),athletes:state.athletes.length,teams:state.teams.length,events:state.events.length,calendarSlots:state.calendar.slots.length,tournaments:state.tournaments.length,tournamentMatches:state.tournaments.reduce((s,t)=>s+t.matches.length,0),points:totalsNow.pts,coins:totalsNow.coins,attacks:`${totalsNow.attacks}/${totalsNow.attackAttempts}`,attackEfficiency:totalsNow.attackAttempts?Math.round(totalsNow.attacks/totalsNow.attackAttempts*100):0};
      currentTab = "dashboard"; saveState(); toast("Simulacao completa registrada."); render();
    }
    document.getElementById("seedBtn").onclick = seedData;
    document.getElementById("simBtn").onclick = runFullSimulation;
    document.getElementById("exportBtn").onclick = exportData;

    document.getElementById("importFile").onchange = e => {

          state = normalizeState(JSON.parse(reader.result));

    const _urUsers = {
      "admin": "ur2025",        // usuário: admin | senha: ur2025
      "ultimaterivals": "volei@2025"  // usuário: ultimaterivals | senha: volei@2025
