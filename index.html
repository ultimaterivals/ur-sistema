<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ultimate Rivals — Sistema Pro v4</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffd21f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UR Sistema">
  <link rel="apple-touch-icon" href="logo_ur_preto-removebg-preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#050507;
      --gold:#c9a84c;
      --gold-2:#ffd84d;
      --ur-yellow:#ffd21f;
      --ur-black:#030405;
      --ur-silver:#e7e9ee;
      --paper:#07080c;
      --panel:#0d0e13;
      --line:#25220f;
      --muted:#908b78;
      --soft:#121217;
      --green:#6f5a13;
      --green-2:#f0c94b;
      --blue:#14120a;
      --red:#8b1c1c;
      --amber:#7a4f0f;
      --shadow:0 20px 48px rgba(0,0,0,.42);
      --font-display:'Barlow Condensed',sans-serif;
      --font-body:'Barlow',sans-serif;
      --font-accent:'Sora',var(--font-body);
      --radius:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      color:#e8e3d4;
      background:#050507;
      background-image:
        radial-gradient(ellipse at 10% 0%,rgba(255,216,77,.1) 0%,transparent 38%),
        radial-gradient(ellipse at 92% 100%,rgba(255,210,31,.045) 0%,transparent 42%),
        linear-gradient(180deg,#07080b 0%,#030405 100%);
      font-family:var(--font-body);
      font-size:13px;
      min-height:100vh;
    }
    button,input,select,textarea{font:inherit;cursor:pointer}
    input,select,textarea{cursor:auto}

    /* ── SHELL ── */
    .app{min-height:100vh}
    .shell{width:min(1280px,calc(100% - 24px));margin:0 auto;padding:16px 0 40px}

    /* ── TOPBAR ── */
    .topbar{
      background:linear-gradient(135deg,#020304 0%,#08090d 58%,#171200 100%);
      border:1px solid rgba(255,210,31,.18);
      border-radius:14px;
      padding:14px 20px;
      display:flex;align-items:center;gap:14px;flex-wrap:wrap;
      box-shadow:0 0 0 1px rgba(255,210,31,.06), var(--shadow);
      position:relative;overflow:hidden;
    }
    .topbar::before{
      content:'';position:absolute;inset:0;
      background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.015) 60px,rgba(255,255,255,.015) 61px);
      pointer-events:none;
    }
    .topbar::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),var(--gold-2),var(--gold),transparent);
    }
    .mark{
      width:58px;height:50px;border-radius:8px;
      background:linear-gradient(135deg,rgba(255,210,31,.15),rgba(255,210,31,.05));
      border:1px solid rgba(255,210,31,.4);
      display:grid;place-items:center;flex:0 0 auto;overflow:hidden;
      box-shadow:0 0 18px rgba(255,210,31,.15);
    }
    .mark img{width:52px;height:42px;object-fit:contain;display:block}
    .ur-text-logo{font-family:var(--font-display);font-size:28px;font-weight:900;color:var(--gold-2);letter-spacing:.06em;line-height:1}
    .brand{min-width:0}
    .brand strong{display:block;font-family:var(--font-accent);color:var(--gold-2);font-size:17px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
    .brand span{display:block;color:rgba(255,255,255,.4);font-size:11px;margin-top:1px;letter-spacing:.04em}
    .top-divider{width:1px;height:36px;background:rgba(255,255,255,.08);flex-shrink:0}
    .season-chip{
      background:rgba(255,210,31,.1);border:1px solid rgba(255,210,31,.3);
      border-radius:8px;padding:6px 12px;
      font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--gold-2);
      letter-spacing:.06em;white-space:nowrap;
    }
    .top-actions{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .pill{border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);border-radius:7px;padding:6px 10px;font-size:11px;background:rgba(255,255,255,.03);font-weight:600}

    /* ── TABS ── */
    .tabs{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(76px,1fr));gap:3px;overflow:visible;
      margin:14px 0 0;
      background:rgba(255,255,255,.03);
      border-radius:10px;
      border:1px solid var(--line);
      padding:4px;
    }
    .tabs::-webkit-scrollbar{height:0}
    .tab{
      border:0;background:transparent;color:var(--muted);
      padding:7px 6px;font-size:10px;font-weight:700;
      white-space:normal;text-align:center;line-height:1.05;border-radius:7px;
      font-family:var(--font-display);letter-spacing:.06em;text-transform:uppercase;
      transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;min-width:0;
    }
    .tab:hover{color:#e8e3d4;background:rgba(255,255,255,.05)}
    .tab.active{color:#0b0c12;background:linear-gradient(135deg,var(--gold-2),var(--gold));box-shadow:0 2px 8px rgba(255,210,31,.3)}
    .tab .tab-icon{display:inline-grid;place-items:center;width:16px;height:16px;font-size:0;filter:drop-shadow(0 0 5px rgba(255,210,31,.28))}
    .tab .tab-icon::before{
      content:"";width:9px;height:15px;background:linear-gradient(180deg,var(--gold-2),var(--gold));
      clip-path:polygon(48% 0,100% 0,65% 38%,100% 38%,30% 100%,44% 55%,0 55%);
    }

    /* ── SECTION BANNER ── */
    .section-banner{
      display:flex;align-items:center;gap:16px;
      padding:18px 20px;
      background:linear-gradient(135deg,rgba(255,210,31,.06) 0%,transparent 60%);
      border:1px solid rgba(255,210,31,.12);
      border-radius:12px;margin-bottom:18px;
      position:relative;overflow:hidden;
    }
    .section-banner::before{
      content:'';position:absolute;top:0;left:0;bottom:0;width:4px;
      background:linear-gradient(180deg,var(--gold-2),var(--gold));
      border-radius:2px 0 0 2px;
    }
    .section-banner-icon{
      width:48px;height:48px;border-radius:8px;
      background:linear-gradient(135deg,rgba(255,210,31,.2),rgba(255,210,31,.05));
      border:1px solid rgba(255,210,31,.3);
      display:grid;place-items:center;flex-shrink:0;font-size:0;
      color:var(--gold-2);box-shadow:inset 0 0 18px rgba(255,210,31,.08);
    }
    .section-banner-icon::before{
      content:"";width:18px;height:30px;background:linear-gradient(180deg,var(--gold-2),var(--gold));
      clip-path:polygon(48% 0,100% 0,65% 38%,100% 38%,30% 100%,44% 55%,0 55%);
      filter:drop-shadow(0 0 9px rgba(255,210,31,.36));
    }
    .section-banner-text{flex:1;min-width:0}
    .section-banner-title{
      font-family:var(--font-display);font-size:26px;font-weight:900;
      color:var(--gold-2);letter-spacing:.04em;text-transform:uppercase;line-height:1;
    }
    .section-banner-sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.03em}
    .section-banner-mark{
      font-family:var(--font-display);font-size:64px;font-weight:900;
      color:rgba(255,210,31,.05);letter-spacing:-.02em;line-height:1;
      position:absolute;right:16px;top:50%;transform:translateY(-50%);
      pointer-events:none;user-select:none;
    }

    /* ── METRICS ── */
    .metrics{display:grid;grid-template-columns:repeat(5,minmax(110px,1fr));gap:8px;margin-bottom:14px}
    .metric{
      background:linear-gradient(135deg,#111218,#08090e);
      border:1px solid var(--line);border-radius:10px;padding:14px 16px;
      position:relative;overflow:hidden;
    }
    .metric::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--metric-color,var(--gold));opacity:.5;border-radius:0 0 10px 10px}
    .metric span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:6px}
    .metric strong{display:block;font-family:var(--font-display);color:var(--gold-2);font-size:28px;font-weight:900;line-height:1}
    .metric.blue{--metric-color:var(--gold)} .metric.blue strong{color:var(--gold-2)}
    .metric.green{--metric-color:var(--green-2)} .metric.green strong{color:#f1d878}
    .metric.red{--metric-color:#ff6b6b} .metric.red strong{color:#ff9f9f}
    .metric.purple{--metric-color:rgba(255,210,31,.7)} .metric.purple strong{color:#dfc56a}

    /* ── GRID ── */
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}

    /* ── PANEL ── */
    .panel{
      background:linear-gradient(160deg,#101116,#090a0f);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:16px;
    }
    .panel.is-collapsed{padding-bottom:10px}
    .panel.is-collapsed > *:not(h2):not(.collapse-toggle){display:none!important}
    .panel h2{
      font-family:var(--font-display);font-size:13px;font-weight:800;
      text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
      margin:0 0 14px;display:flex;align-items:center;gap:8px;
    }
    .collapse-toggle{margin-left:auto!important;padding:3px 7px!important;font-size:10px!important;line-height:1}
    .panel h2::before{content:'';display:block;width:3px;height:14px;background:var(--gold);border-radius:2px;flex-shrink:0}
    .panel h3{font-family:var(--font-display);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:0 0 10px}
    .span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}
    .span-7{grid-column:span 7}.span-8{grid-column:span 8}.span-9{grid-column:span 9}.span-12{grid-column:span 12}

    /* ── BUTTONS ── */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:5px;
      border:1px solid var(--line);background:rgba(255,255,255,.04);color:#e8e3d4;
      border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;
      transition:all .15s;letter-spacing:.03em;white-space:nowrap;font-family:var(--font-body);
    }
    .btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn.small{padding:5px 10px;font-size:11px}
    .btn.primary{background:rgba(255,210,31,.1);border-color:rgba(255,210,31,.4);color:var(--gold-2)}
    .btn.primary:hover{background:rgba(255,210,31,.18)}
    .btn.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold));border-color:var(--gold);color:#0b0c12;font-weight:800}
    .btn.gold:hover{background:linear-gradient(135deg,#ffe76a,var(--gold-2));transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,210,31,.25)}
    .btn.danger{color:#ff8b8b;border-color:rgba(255,80,80,.25);background:rgba(255,80,80,.04)}
    .btn.danger:hover{background:rgba(255,80,80,.1)}

    /* ── LISTS / ROWS ── */
    .list{display:flex;flex-direction:column;gap:0}
    .row{
      display:flex;align-items:center;gap:10px;
      padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);
    }
    .row:last-child{border-bottom:0}
    .row.gold .title{color:var(--gold-2)}
    .row.gold .avatar{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#0b0c12;font-weight:900}
    .grow{flex:1;min-width:0}
    .avatar{
      width:36px;height:36px;border-radius:9px;
      background:linear-gradient(135deg,#18191e,#0b0c10);
      border:1px solid var(--line);
      display:grid;place-items:center;flex-shrink:0;
      font-family:var(--font-display);font-size:13px;font-weight:800;color:var(--muted);
    }
    .title{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e8e3d4}
    .sub{font-size:11px;color:var(--muted);margin-top:2px}
    .score{font-family:var(--font-display);font-weight:800;font-size:16px;color:var(--gold-2);text-align:right;flex-shrink:0}
    .chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
    .chip{
      display:inline-block;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted);
      font-family:var(--font-display);letter-spacing:.04em;text-transform:uppercase;
    }
    .chip.gold{background:rgba(255,210,31,.12);border-color:rgba(255,210,31,.3);color:var(--gold-2)}
    .chip.blue{background:rgba(255,210,31,.08);border-color:rgba(255,210,31,.2);color:#dfc56a}
    .chip.green{background:rgba(255,210,31,.11);border-color:rgba(255,210,31,.25);color:#f1d878}
    .chip.red{background:rgba(165,40,40,.15);border-color:rgba(165,40,40,.3);color:#ff8b8b}
    .chip.purple{background:rgba(255,255,255,.05);border-color:rgba(255,210,31,.16);color:#b9b09a}
    .chip.waiting{background:rgba(255,180,65,.13);border-color:rgba(255,180,65,.32);color:#ffc56b}
    .chip.cancelled{background:rgba(165,40,40,.17);border-color:rgba(165,40,40,.36);color:#ff8b8b}
    .chip.confirmed{background:rgba(33,111,58,.2);border-color:rgba(64,180,103,.36);color:#7bdc92}
    .chip.planned{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#d8d3c4}
    .bar{height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin-top:5px}
    .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));border-radius:999px}

    /* ── FORMS ── */
    .form{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
    .field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
    .field.small{flex:0 0 90px;min-width:70px}
    .field.full{flex:0 0 100%;min-width:0}
    .field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
    input:not([type=checkbox]):not([type=radio]):not(.check):not(.mini-input),select,textarea{
      background:#0a0b14;border:1px solid var(--line);border-radius:8px;padding:8px 10px;
      color:#e8e3d4;outline:none;width:100%;font-size:12px;transition:border-color .15s;
    }
    input:not([type=checkbox]):not([type=radio]):not(.check):not(.mini-input):focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,210,31,.08)}
    option{background:#0a0b14}
    .mini-input{background:#0a0b14;border:1px solid var(--line);border-radius:5px;padding:3px 5px;color:#e8e3d4;width:60px;font-size:11px;text-align:center;outline:none}
    .mini-input:focus{border-color:var(--gold)}
    .check{accent-color:var(--gold);width:15px;height:15px}

    /* ── TABLES ── */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead tr{background:#0a0b14}
    th{padding:8px 8px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--line)}
    td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
    tr:last-child td{border-bottom:0}
    tr:hover td{background:rgba(255,255,255,.02)}

    /* ── EMPTY ── */
    .empty{padding:28px;text-align:center;color:var(--muted);font-size:12px;border:1px dashed var(--line);border-radius:8px}

    /* ── MATCH CARD ── */
    .phase-grid{display:flex;flex-direction:column;gap:16px}
    .phase{background:#141520;border:1px solid var(--line);border-radius:10px;padding:12px}
    .phase h3{font-family:var(--font-display);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:0 0 10px;display:flex;align-items:center;gap:6px}
    .phase h3::before{content:'';display:block;width:3px;height:13px;background:var(--gold);border-radius:2px}
    .match-card{border:1px solid var(--line);border-radius:9px;padding:12px;margin-top:8px;background:#0f1019}
    .match-card.done{border-color:rgba(255,210,31,.35);background:rgba(255,210,31,.03)}
    .match-stats-wrap{overflow-x:auto;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}

    /* ── PORTAL / MARKET ── */
    .portal-card{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:12px}
    .portal-number{font-family:var(--font-display);font-size:28px;font-weight:900;color:var(--gold-2)}

    /* ── MISC ── */
    .hidden{display:none!important}
    .badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:800;background:#151205;color:var(--gold-2);border:1px solid rgba(255,210,31,.25)}
    .badge.warn{background:#2a1a0a;color:var(--gold-2);border-color:#4a3a1a}
    .badge.danger{background:#2a0a0a;color:#ff8b8b;border-color:#4a1a1a}
    .undo-bar{background:rgba(255,216,77,.06);border:1px solid rgba(255,216,77,.25);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .info-box{background:rgba(255,210,31,.07);border:1px solid rgba(255,210,31,.24);border-radius:9px;padding:10px 14px;font-size:12px;color:#d9c06a;margin-bottom:12px}
    .backup-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .backup-slot{background:#0e0f18;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:12px}
    .backup-slot strong{display:block;color:var(--gold-2);font-size:13px;margin-bottom:4px}
    .sb-input,select.sb-input{width:100%;background:#0a0b14;border:1px solid var(--line);border-radius:7px;padding:7px 9px;color:#e8e3d4;font-size:12px;outline:none;margin-bottom:8px}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
      background:#13141e;border:1px solid var(--gold);color:var(--gold-2);
      padding:10px 20px;border-radius:9px;font-weight:700;font-size:13px;
      z-index:99;display:none;box-shadow:var(--shadow);
      font-family:var(--font-display);letter-spacing:.04em;
    }
    .toast.show{display:block;animation:toastIn .2s ease}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
    .modal{background:#131420;border:1px solid var(--line);border-radius:14px;padding:26px;width:min(600px,calc(100vw - 32px));max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);position:relative}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;padding:4px;border-radius:6px}
    .modal-close:hover{color:#fff;background:rgba(255,255,255,.08)}

    /* ── STATS ── */
    .stats-details summary::-webkit-details-marker{display:none}

    /* ── ANIMATIONS ── */
    @keyframes riseIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .view:not(.hidden){animation:riseIn .2s ease both}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .metrics{grid-template-columns:repeat(2,1fr)}
      .span-3,.span-4,.span-5,.span-6,.span-7,.span-8,.span-9{grid-column:span 12}
      .section-banner-mark{display:none}
      .topbar{flex-wrap:wrap}
    }

    /* ── SIDEBAR NAV ── */
    .nav-row{
      display:flex;align-items:center;gap:6px;
      margin:12px 0 0;
      position:relative;
    }
    .primary-tabs{
      display:flex;gap:3px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:10px;padding:4px;
      flex:1;min-width:0;overflow-x:auto;
      scrollbar-width:none;
    }
    .primary-tabs::-webkit-scrollbar{display:none}
    .primary-tabs .tab{flex:1;min-width:68px;white-space:nowrap}

    .more-btn{
      flex-shrink:0;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:9px;
      padding:8px 14px;
      color:var(--muted);
      font-size:11px;font-weight:800;
      font-family:var(--font-display);
      letter-spacing:.06em;text-transform:uppercase;
      cursor:pointer;transition:all .15s;
      display:flex;align-items:center;gap:6px;
    }

    function teamPickList(prefix, role, selectedValues=[], max=2){
      const selectedSet = new Set(selectedValues);
      const options = state.athletes.filter(a=>!selectedSet.has(a.id)).map(a=>`<option value="${a.id}">${esc(a.name)} (${a.level}/${a.gender})</option>`).join("");
      const rows = selectedValues.map(id=>{

      }).join("");
      return `<div class="form"><div class="field"><select id="${prefix}-${role}-select"><option value="">Selecionar atleta</option>${options}</select></div><button class="btn small primary" type="button" data-add-team-pick="${prefix}:${role}:${max}">Adicionar</button></div><div class="list" style="margin-top:8px">${rows || `<div class="empty" style="padding:12px">Nenhum atleta selecionado.</div>`}</div><div class="sub" id="${prefix}-${role}-count" style="margin-top:6px"></div>`;
    }
    function bindTeamPickLimits(prefix, size){
      const current = role => [...document.querySelectorAll("." + prefix + "-" + role)].map(el=>el.value).filter(Boolean);
      document.querySelectorAll(`[data-add-team-pick^="${prefix}:"]`).forEach(btn=>btn.onclick=()=>{
        const [,role,maxText]=btn.dataset.addTeamPick.split(":");
        const max = Number(maxText || (role==="player"?size:6));
        const sel = document.getElementById(`${prefix}-${role}-select`);
        const id = sel?.value;
        if(!id) return toast("Selecione um atleta.");
        const players = current("player"), reserves = current("reserve");
        if(players.includes(id) || reserves.includes(id)) return toast("Este atleta ja esta nesta equipe.");
        if(role==="player" && players.length >= size) return toast("Limite de titulares atingido para esta modalidade.");
        if(role==="reserve" && reserves.length >= max) return toast("Limite de reservas atingido.");
        if(role==="player") players.push(id); else reserves.push(id);
        fillTeamPlayerSelects(prefix,{players,reserves});
      });
      document.querySelectorAll(`[data-remove-team-pick^="${prefix}:"]`).forEach(btn=>btn.onclick=()=>{
        const [,role,id]=btn.dataset.removeTeamPick.split(":");
        const players = current("player").filter(x=>!(role==="player" && x===id));
        const reserves = current("reserve").filter(x=>!(role==="reserve" && x===id));
        fillTeamPlayerSelects(prefix,{players,reserves});
      });
      const players = current("player"), reserves = current("reserve");
      const pc = document.getElementById(prefix+"-player-count");
      const rc = document.getElementById(prefix+"-reserve-count");
      if(pc) pc.innerHTML = `<strong>${players.length}/${size}</strong> titulares selecionados ${players.length < size ? "- equipe em formacao" : "- equipe fechada"}`;
      if(rc) rc.innerHTML = `<strong>${reserves.length}/6</strong> reservas selecionados`;
    }

    function bindCollapsiblePanels(){
      document.querySelectorAll(".view:not(.hidden) .panel").forEach((panel,i)=>{
        const title = panel.querySelector(":scope > h2");
        if(!title || title.querySelector(".collapse-toggle")) return;
        const key = currentTab + ":" + i + ":" + title.textContent.trim();
        panel.dataset.collapseKey = key;
        if(collapsedPanels[key]) panel.classList.add("is-collapsed");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn small collapse-toggle";
        btn.textContent = panel.classList.contains("is-collapsed") ? "Expandir" : "Minimizar";
        btn.onclick = (e)=>{
          e.stopPropagation();
          panel.classList.toggle("is-collapsed");
          collapsedPanels[key] = panel.classList.contains("is-collapsed");
          btn.textContent = collapsedPanels[key] ? "Expandir" : "Minimizar";
        };
        title.appendChild(btn);
      });

    function seasonHealth(){
      let score = 0, max = 0;
      const hasAthletes = state.athletes.length >= 8; score += hasAthletes ? 20 : Math.round(state.athletes.length/8*20); max += 20;
      const hasTeams = state.teams.length >= 4; score += hasTeams ? 20 : Math.round(state.teams.length/4*20); max += 20;
      const hasEvents = state.events.filter(e=>e.type!=="ct").length >= 4; score += hasEvents ? 20 : Math.round(state.events.filter(e=>e.type!=="ct").length/4*20); max += 20;
      const hasTournaments = state.tournaments.length >= 1; score += hasTournaments ? 20 : 0; max += 20;
      const activeAthletes = state.athletes.filter(a=>a.presences>0).length;
      const actPct = state.athletes.length ? activeAthletes/state.athletes.length : 0;
      score += Math.round(actPct*20); max += 20;
      return Math.round(score/max*100);

    // ── XLSX IMPORT ─────────────────────────────────────────────────────────
    async function _xlsxInflate(data){
      const ds=new DecompressionStream('deflate-raw');
      const w=ds.writable.getWriter(); w.write(data); w.close();
      const chunks=[]; const r=ds.readable.getReader();
      for(;;){const {done,value}=await r.read(); if(done)break; chunks.push(value);}
      let n=0; for(const c of chunks) n+=c.length;
      const out=new Uint8Array(n); let off=0;
      for(const c of chunks){out.set(c,off);off+=c.length;}
      return out;
    }
    async function importXLSXFile(file){
      const buf=await file.arrayBuffer();
      const bytes=new Uint8Array(buf); const view=new DataView(buf);
      // Parse from Central Directory (end of ZIP) so Data Descriptor files work correctly.
      // Google Sheets sets bit 3 (Data Descriptor flag) so local headers have csize=0;
      // the Central Directory always has the real compressed sizes.
      let eocd=-1;
      for(let i=bytes.length-22;i>=Math.max(0,bytes.length-65558);i--){
        if(view.getUint32(i,true)===0x06054b50){eocd=i;break;}
      }
      if(eocd<0)throw new Error('Arquivo .xlsx inválido (EOCD não encontrado)');
      const cdOffset=view.getUint32(eocd+16,true);
      const cdCount=view.getUint16(eocd+8,true);
      // Collect entries from Central Directory
      const cdList=[];
      let cdPos=cdOffset;
      for(let i=0;i<cdCount;i++){
        if(view.getUint32(cdPos,true)!==0x02014b50)break;
        const comp=view.getUint16(cdPos+10,true);
        const csize=view.getUint32(cdPos+20,true);
        const fnLen=view.getUint16(cdPos+28,true);
        const exLen=view.getUint16(cdPos+30,true);
        const cmLen=view.getUint16(cdPos+32,true);
        const lhOffset=view.getUint32(cdPos+42,true);
        const name=new TextDecoder().decode(bytes.slice(cdPos+46,cdPos+46+fnLen));
        cdList.push({name,comp,csize,lhOffset});
        cdPos+=46+fnLen+exLen+cmLen;
      }
      // Read each file using offset from Central Directory
      const entries={};
      for(const e of cdList){
        if(view.getUint32(e.lhOffset,true)!==0x04034b50)continue;
        const lhFnLen=view.getUint16(e.lhOffset+26,true);
        const lhExLen=view.getUint16(e.lhOffset+28,true);
        const dataStart=e.lhOffset+30+lhFnLen+lhExLen;
        const data=bytes.slice(dataStart,dataStart+e.csize);
        entries[e.name]=(e.comp===8)?await _xlsxInflate(data):data;
      }
      const dec=new TextDecoder('utf-8');
      const strs=[];
      if(entries['xl/sharedStrings.xml']){
        const xml=new DOMParser().parseFromString(dec.decode(entries['xl/sharedStrings.xml']),'text/xml');
        for(const si of xml.querySelectorAll('si'))
          strs.push([...si.querySelectorAll('t')].map(t=>t.textContent).join(''));
      }
      const cv=cell=>{
        const t=cell.getAttribute('t'), v=cell.querySelector('v');
        if(!v)return ''; return t==='s'?(strs[+v.textContent]||''):v.textContent;
      };
      const sh1data=entries['xl/worksheets/sheet1.xml'];
      if(!sh1data)throw new Error('Planilha1 não encontrada no arquivo');
      const sh1=new DOMParser().parseFromString(dec.decode(sh1data),'text/xml');
      const rows=[...sh1.querySelectorAll('row')];
      const hdrs={};
      const row1=rows.find(r=>r.getAttribute('r')==='1');
      if(row1)for(const c of row1.querySelectorAll('c')){
        const col=c.getAttribute('r').replace(/\d+$/,'');
        hdrs[col]=cv(c).trim();
      }
      const fc=pat=>Object.entries(hdrs).find(([,h])=>pat.test(h))?.[0];
      const C={
        name:fc(/Nome Completo/i), mediaName:fc(/mídias|midia|transmiss/i),
        phone:fc(/WhatsApp/i), email:fc(/^Email$/i), emailAlt:fc(/ENDEREÇO DE EMAIL/i),
        birth:fc(/Nascimento/i), cpf:fc(/^CPF$/i), city:fc(/Cidade|Polo/i),
        pos:fc(/Posi/i), tech:fc(/técnica geral|cnica geral/i), phys:fc(/física|fisica|Intensidade/i),
        cats:fc(/Categorias desejadas/i), days:fc(/melhor dia/i), shift:fc(/^Turno$/i),
        team:fc(/Nome da Equipe/i), hasTeam:fc(/faz parte de alguma equipe/i),
        mod:fc(/Modalidade de Participa/i), emerg:fc(/Emerg/i),
        practiceYears:fc(/Tempo de prática|tempo de pratica/i),
        tournamentExp:fc(/disputou torneios/i), acceptsReloc:fc(/realocado/i),
        medicalRestr:fc(/lesão|lesao|restrição médica|restricao medica/i),
        imageAuth:fc(/uso da minha imagem/i), payment:fc(/realizado o pagamento/i),
      };
      const mapPos=p=>{
        if(/Ponta/i.test(p))return 'Ponteiro(a)';
        if(/Oposto/i.test(p))return 'Oposto(a)';
        if(/Levantador/i.test(p))return 'Levantador(a)';
        if(/Central/i.test(p))return 'Central';
        if(/Libero|Líbero/i.test(p))return 'Libero';
        return 'Universal';
      };
      const mapLvl=s=>{const n=parseFloat(s);if(isNaN(n)||n<=0)return 'N1';if(n<=2)return 'NI';if(n<=3)return 'N1';if(n<=4)return 'N2';return 'N3';};
      const mapGnd=c=>{const f=/Fem/i.test(c),m=/Masc/i.test(c);return f&&!m?'F':m&&!f?'M':'';};
      const xlDate=s=>{const d=parseFloat(s);if(!d||d<1)return '';const b=new Date(1899,11,30);b.setDate(b.getDate()+d);return b.toISOString().slice(0,10);};
      const g=(cells,col)=>col?(cells[col]||''):'';
      const mapDays=t=>{const m={dom:0,seg:1,'ter':2,qua:3,qui:4,sex:5,sab:6,segunda:1,'terça':2,terca:2,quarta:3,quinta:4,sexta:5,sábado:6,sabado:6,domingo:0};return[...new Set(t.toLowerCase().split(/[,;/\s]+/).map(d=>m[d.slice(0,3)]).filter(d=>d!==undefined))].map(String);};
      const mapShifts=t=>{const s=[];if(/manh/i.test(t))s.push('Manha');if(/tard/i.test(t))s.push('Tarde');if(/noit/i.test(t))s.push('Noite');if(/fim|semana/i.test(t))s.push('Fim de semana');return s;};
      const mapCats=t=>{const ids=[];if(/dupla.*masc|masc.*dupla/i.test(t))ids.push('DM');if(/dupla.*fem|fem.*dupla/i.test(t))ids.push('DF');if(/dupla.*mist|mist.*dupla|DX/i.test(t))ids.push('DX');if(/quart.*masc|masc.*quart/i.test(t))ids.push('QM');if(/quart.*fem|fem.*quart/i.test(t))ids.push('QF');if(/quart.*mist|mist.*quart|QX/i.test(t))ids.push('QX');return ids;};
      const yesNo=t=>/sim|yes|true|1/i.test(t);
      const imported=[];
      for(const row of rows){
        if(row.getAttribute('r')==='1')continue;
        const cells={};
        for(const c of row.querySelectorAll('c'))cells[c.getAttribute('r').replace(/\d+$/,'')]=cv(c);
        const name=g(cells,C.name).trim();
        if(name.length<2)continue;
        let phone=g(cells,C.phone).replace(/\D/g,'');
        if(phone.length>11)phone=phone.slice(-11);
        const rawCats=g(cells,C.cats);
        const rawMod=g(cells,C.mod);
        const mappedCats=mapCats(rawCats);
        const mappedDays=mapDays(g(cells,C.days));
        const mappedShifts=mapShifts(g(cells,C.shift));
        imported.push({
          id:uid(), name,
          mediaName:g(cells,C.mediaName),
          level:mapLvl(g(cells,C.tech)), gender:mapGnd(rawCats),
          position:mapPos(g(cells,C.pos)), contact:phone,
          city:g(cells,C.city), birth:xlDate(g(cells,C.birth)),
          document:g(cells,C.cpf).replace(/[^\d.\-]/g,''),
          emergency:g(cells,C.emerg),
          email:g(cells,C.email)||g(cells,C.emailAlt),
          practiceYears:g(cells,C.practiceYears),
          tournamentExperience:yesNo(g(cells,C.tournamentExp)),
          physicalScore:g(cells,C.phys),
          acceptsRelocation:yesNo(g(cells,C.acceptsReloc)),
          medicalRestriction:g(cells,C.medicalRestr),
          imageAuth:yesNo(g(cells,C.imageAuth)),
          paymentStatus:yesNo(g(cells,C.payment)),
          desiredModalities:mappedCats.length?mappedCats:(rawMod?[rawMod]:[]),
          desiredDays:mappedDays,
          desiredShifts:mappedShifts,
          desiredPairPositions:[], teamId:'',
          notes:g(cells,C.medicalRestr)?'Restrição: '+g(cells,C.medicalRestr):'',
          pts:0,coins:0,wins:0,losses:0,presences:0,streak:0,mvps:0,fairplays:0,
          stats:{aces:0,attacks:0,attackAttempts:0,serveAttempts:0,blocks:0,digs:0,points:0,assists:0,run3:0,run5:0,clutch:0,comeback:0},
          history:[]
        });
      }
      return imported;
    }
    async function handleXLSXImport(file){
      if(!file)return;
      if(!file.name.toLowerCase().endsWith('.xlsx'))return toast('Selecione um arquivo .xlsx');
      toast('Lendo planilha...');
      try{
        const data=await importXLSXFile(file);
        if(!data.length)return toast('Nenhum atleta encontrado na planilha.');
        let added=0,skipped=0;
        const existing=new Set(state.athletes.map(a=>a.name.toLowerCase().trim()));
        for(const a of data){
          if(existing.has(a.name.toLowerCase().trim())){skipped++;continue;}
          state.athletes.push(a); existing.add(a.name.toLowerCase().trim()); added++;
        }
        saveState();
        toast(added+' atleta(s) importado(s).'+(skipped?' '+skipped+' já existia(m).':''));
        render();
      }catch(err){console.error(err);toast('Erro ao ler planilha: '+err.message);}
    }

    async function importInscricoesSupabase(){
      const intg = state.integrations || {};
      const url = intg.supabase?.url; const key = intg.supabase?.key;
      if(!url || !key) return toast('Configure o Supabase em Configurações antes de importar.');
      toast('Buscando inscrições...');
      try {
        const res = await fetch(`${url}/rest/v1/ur_inscricoes?status=eq.pendente&imported=eq.false&order=submitted_at.desc`, {
          headers:{'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json'}
        });
        if(!res.ok) return toast('Erro ao buscar inscrições: '+res.status);
        const rows = await res.json();
        if(!rows.length) return toast('Nenhuma inscrição pendente encontrada.');
        // Mapear campos da tabela ur_inscricoes → atleta do sistema
        const catMap = {DM:'DM',DF:'DF',DX:'DX',QM:'QM',QF:'QF',QX:'QX'};
        let added=0, skipped=0;
        const existing = new Set(state.athletes.map(a=>a.name.toLowerCase().trim()));
        const idsToMark = [];
        for(const r of rows){
          if(!r.name || r.name.length<2){ skipped++; continue; }
          if(existing.has(r.name.toLowerCase().trim())){ skipped++; idsToMark.push(r.id); continue; }
          const parsedCats = (() => { try{ return JSON.parse(r.categories||'[]'); }catch(e){ return []; } })();
          const parsedDays = (() => { try{ return JSON.parse(r.days||'[]'); }catch(e){ return []; } })();
          const parsedShifts = (() => { try{ return JSON.parse(r.shifts||'[]'); }catch(e){ return []; } })();
          const parsedMods = (() => { try{ return JSON.parse(r.modalities||'[]'); }catch(e){ return []; } })();
          const mapLvl = s => { const n=Number(s); if(!n||n<=0)return'NI'; if(n<=2)return'NI'; if(n<=3)return'N1'; if(n<=4)return'N2'; return'N3'; };
          state.athletes.push({
            id:uid(), name:r.name, mediaName:r.media_name||'',
            gender:r.gender||'', birth:r.birth||'', document:r.cpf||'',
            contact:r.phone||'', email:r.email||'', city:r.city||'',
            emergency:r.emergency||'', position:r.position||'Universal',
            level:mapLvl(r.tech_score), practiceYears:r.practice_years||'',
            tournamentExperience:!!r.tournament_exp, physicalScore:String(r.phys_score||''),
            acceptsRelocation:!!r.accepts_reloc, medicalRestriction:r.medical_restriction||'',
            imageAuth:!!r.image_auth, paymentStatus:!!r.payment_status,
            desiredModalities:parsedCats.length?parsedCats:parsedMods,
            desiredDays:parsedDays, desiredShifts:parsedShifts,
            desiredPairPositions:[], teamId:'',
            notes:r.medical_restriction?'Restrição: '+r.medical_restriction:'',
            pts:0,coins:0,wins:0,losses:0,presences:0,streak:0,mvps:0,fairplays:0,
            stats:{aces:0,attacks:0,attackAttempts:0,serveAttempts:0,blocks:0,digs:0,points:0,assists:0,run3:0,run5:0,clutch:0,comeback:0},
            history:[]
          });
          existing.add(r.name.toLowerCase().trim());
          idsToMark.push(r.id); added++;
        }
        saveState();
        // Marcar como importado no Supabase
        if(idsToMark.length){
          await fetch(`${url}/rest/v1/ur_inscricoes?id=in.(${idsToMark.join(',')})`, {
            method:'PATCH', headers:{'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json','Prefer':'return=minimal'},
            body:JSON.stringify({imported:true, imported_at:new Date().toISOString(), status:'aprovado'})
          });
        }
        toast(`${added} atleta(s) importado(s) das inscrições.${skipped?' '+skipped+' já existia(m).':''}`);
        render();
      } catch(e){ console.error(e); toast('Erro: '+e.message); }
    }

    const levelingManualFields = [

    const levelingCriteria = {

    function clampGrade(v){v=Number(v||0);return Math.max(0,Math.min(5,v))}
    function avgGrades(values){

    function levelFromAverage(avg){
      if(avg >= 4.5) return "N1";

    function liveLevelingScore(evals={}){
      const values = levelingManualFields.map(([key])=>clampGrade(evals[key]));

      const sum = filledValues.reduce((a,b)=>a+b,0);
      const average = filledValues.length ? sum / filledValues.length : 0;
      return {
        sum:Number(sum.toFixed(1)),
        average:Number(average.toFixed(2)),
        filled:filledValues.length,
        complete:filledValues.length >= 6,
        target:levelFromAverage(average)
      };

    function registerComputedLevel(a, score, source, reasonExtra=""){
      if(!a || !score.complete || !score.target) return false;

      a.evolution = normalizeAthleteEvaluation(a.evolution || {});
      a.evolution.computedSum = score.sum;
      a.evolution.computedAverage = score.average;
      a.evolution.computedLevel = to;
      a.evolution.computedAt = new Date().toISOString();
      const last = state.leveling.history[state.leveling.history.length - 1];
      const reason = `Nivel calculado automaticamente por ${source}: soma ${score.sum}, media ${score.average}/5, ${score.filled} notas${reasonExtra ? " - " + reasonExtra : ""}`;
      if(!last || last.athleteId !== a.id || last.to !== to || last.reason !== reason){

    function manualEvaluationScore(a){
      const e = normalizeAthleteEvaluation(a.evolution || {});

      const physicalAvg = avgGrades([e.physical]);
      const behaviorAvg = avgGrades([e.behavior]);
      const growthAvg = avgGrades([e.engagement,e.leadership,e.potential]);
      const filled = levelingManualFields.filter(([k])=>clampGrade(e[k])>0).length;
      const average = filled ? ((technicalAvg*0.55) + (physicalAvg*0.15) + (behaviorAvg*0.15) + (growthAvg*0.15)) : 0;
      return {
        average:Number(average.toFixed(2)),
        technicalAvg:Number(technicalAvg.toFixed(2)),
        physicalAvg:Number(physicalAvg.toFixed(2)),
        behaviorAvg:Number(behaviorAvg.toFixed(2)),
        growthAvg:Number(growthAvg.toFixed(2)),

    function levelingScore(a){
      const evCount = (a.history || []).length;

      const total = Math.round(technical + result + attendance + manualPoints);

      if(score.manual.complete && score.manual.target && a.level !== score.manual.target){

        if(diff > 0) return {action:"Subir", target:score.manual.target, cls:"green", reason:`Ficha manual indica nivel acima (${score.manual.average}/5)`};

    function confirmCt(){
      let totalPts = 0, totalCoins = 0, participants = 0;
      const evId = uid();
      const playerDeltas = {};
      state.athletes.forEach(a => {
        const st = eventDraft.stats[a.id] || {};
        if(!st.pres) return;
        const pts = state.rules.ctPresence.pts + (st.evol?state.rules.ctEvolution.pts:0) + (st.dest?state.rules.ctHighlight.pts:0) + (st.mission?state.rules.mission.pts:0);
        const coins = state.rules.ctPresence.coins + (st.evol?state.rules.ctEvolution.coins:0) + (st.dest?state.rules.ctHighlight.coins:0) + (st.mission?state.rules.mission.coins:0);
        a.pts += pts; a.coins += coins; a.presences += 1;
        a.history.push({eventId:evId, week:state.week, type:"ct", pts, coins});
        playerDeltas[a.id] = {pts, coins, presences:1, streak:0, wins:0, losses:0, mvps:0, fairplays:0, aces:0, attacks:0, blocks:0, digs:0, points:0, assists:0, run3:0, run5:0, clutch:0, comeback:0};
        totalPts += pts; totalCoins += coins; participants += 1;
      });
      state.events.push({id:evId, type:"ct", week:state.week, participants, points:totalPts, coins:totalCoins, date:new Date().toISOString(), playerDeltas});
      eventDraft.stats = {};
      toast("✓ CT UR confirmado e salvo.");
      render();
    }
    function tournamentStep(t){
      const hasTeams = Object.values(t.groups || {}).some(g => g.length > 0);
      const groupMatches = t.matches.filter(m => m.phase.startsWith("Grupo"));
      const hasGroupMatches = groupMatches.length > 0;
      const allGroupsDone = hasGroupMatches && groupMatches.every(m => m.status === "done");
      const hasFinals = t.matches.some(m => !m.phase.startsWith("Grupo"));
      if(hasFinals) return 5;
      if(allGroupsDone) return 4;
      if(hasGroupMatches) return 3;
      if(hasTeams) return 2;
      return 1;
    }

      // Top scorers from this tournament
      const allPlayerIds = new Set(t.matches.flatMap(m=>[...(teamById(m.teamA)?.players||[]),...(teamById(m.teamB)?.players||[])]));
      const topScorers = [...allPlayerIds].map(id=>({a:athleteById(id),id})).filter(x=>x.a)

        .sort((a,b)=>b.pts-a.pts).slice(0,5);

              ${teamA.players.map(id=>athleteById(id)).filter(Boolean).map(a=>tourStatRow(a,m,true,aWon)).join("")}

    const CITY_COLOR_MAP = false; // sentinel only
    function renderMatchCard(t,m){

              style="width:70px;text-align:center;font-size:30px;font-weight:900;font-family:'Barlow Condensed',sans-serif;background:rgba(255,255,255,.06);border:2px solid ${hasWinner&&pA>pB?"var(--gold)":"var(--line)"};border-radius:8px;padding:5px;color:${hasWinner&&pA>pB?"var(--gold-2)":"#e8e4d8"};outline:none">

              data-tour-field="${t.id}:${m.id}:${fieldB}" data-score-b="1"
              style="width:70px;text-align:center;font-size:30px;font-weight:900;font-family:'Barlow Condensed',sans-serif;background:rgba(255,255,255,.06);border:2px solid ${hasWinner&&pB>pA?"var(--gold)":"var(--line)"};border-radius:8px;padding:5px;color:${hasWinner&&pB>pA?"var(--gold-2)":"#e8e4d8"};outline:none">
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;margin-left:8px">
            <button class="btn small ${m.status==="done"?"gold":"primary"}" data-tour-status="${t.id}" data-match-id="${m.id}">
              ${m.status==="done"?"✓ Finalizado":"Finalizar e aplicar pontos"}
            </button>
            <div class="sub match-winner-label" style="text-align:center">${matchWinnerLabel(m)}</div>
          </div>
        </div>

        <!-- ── ESTATÍSTICAS INLINE ── -->
        <details class="stats-details" ${statsCount>0||m.status==="done"?"open":""}>
          <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:${statsCount>0?"var(--gold-2)":"var(--muted)"};padding:6px 0;user-select:none;border-top:1px solid var(--line);margin-top:4px">
            <span style="font-size:15px">📊</span>

            ${m.status==="done"&&m.playerDeltas?`<span style="background:rgba(33,111,58,.35);color:#7bdc92;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:800">✓ aplicado</span>`:""}

    function updateTournamentMatch(el){
      const [tid, mid, field] = (el.dataset.tourField || "").split(":");
      if(!tid || !mid || !field) return;
      const tournament = state.tournaments.find(t=>t.id===tid);
      const match = tournament?.matches.find(m=>m.id===mid);
      if(!match) return;
      const isNumeric = field.startsWith("sets") || field.startsWith("points");
      match[field] = isNumeric ? Number(el.value || 0) : el.value;
      saveState();
      // Update only the winner label inside this match card without re-rendering the whole page
      const card = el.closest(".match-card");
      if(card){
        const lbl = card.querySelector(".match-winner-label");
        if(lbl) lbl.textContent = matchWinnerLabel(match);
        // Visual feedback on score inputs
        if(isNumeric){
          const scoreA = card.querySelector("[data-score-a]");
          const scoreB = card.querySelector("[data-score-b]");
          if(scoreA && scoreB){
            const va = Number(scoreA.value||0), vb = Number(scoreB.value||0);
            const valid = va !== vb && (va > 0 || vb > 0);
            [scoreA, scoreB].forEach(inp => {
              inp.style.borderColor = valid ? "var(--green)" : "";
              inp.style.color = valid ? (inp===scoreA ? (va>vb?"var(--gold-2)":"") : (vb>va?"var(--gold-2)":"")) : "";
            });
          }
        }
        // Update the standings panel if this is a group match
        const isGroup = match.scoring === "points18" || match.phase.startsWith("Grupo");
        if(isGroup && match.status==="done"){
          renderTournamentStandings(tid);
        }
      }
    }
    function renderTournamentStandings(tid){
      const t = state.tournaments.find(x=>x.id===tid);
      if(!t) return;
      ["A","B"].forEach(g=>{
        const el = document.querySelector(`[data-standings="${tid}:${g}"]`);
        if(!el) return;
        const standings = groupStandings(t,g);
        el.innerHTML = standings.map((r,i)=>{
          const isTop2 = i < 2;
          return `<tr style="${isTop2?"background:rgba(255,210,31,.05)":""}">
            <td><strong style="color:${isTop2?"var(--gold-2)":"var(--muted)"}">${i+1}</strong></td>
            <td><strong>${esc(r.name)}</strong>${isTop2?` <span style="font-size:9px;color:var(--gold-2);font-weight:800">CLASSIF.</span>`:""}</td>
            <td style="color:#7bdc92;font-weight:700">${r.w}</td>
            <td style="color:#ff8b8b">${r.l}</td>
            <td style="font-weight:700;color:${r.diff>0?"var(--gold-2)":r.diff<0?"#ff8b8b":"var(--muted)"}">${r.diff>0?"+":""}${r.diff}</td>
            <td style="color:var(--gold-2);font-weight:700">${r.pf}</td>
            <td style="color:#ff8b8b">${r.pc}</td>
          </tr>`;
        }).join("");
      });
    }
    function setTournamentMatchStatus(tid, mid){
      const tournament = state.tournaments.find(t=>t.id===tid);
      const match = tournament?.matches.find(m=>m.id===mid);
      if(!match) return;
      // Read latest values from DOM inputs (capture any unsaved changes)
      document.querySelectorAll(`[data-tour-field^="${tid}:${mid}:"]`).forEach(el => {
        const field = el.dataset.tourField.split(":")[2];
        if(!field) return;
        match[field] = (field.startsWith("sets") || field.startsWith("points")) ? Number(el.value || 0) : el.value;
      });
      const isGroup = match.scoring === "points18" || match.phase.startsWith("Grupo");
      const pA = isGroup ? match.pointsA : match.setsA;
      const pB = isGroup ? match.pointsB : match.setsB;
      if(!match.teamA || !match.teamB) return toast("Defina as duas equipes antes de finalizar.");
      if(pA === pB) return toast("O placar precisa ter um vencedor — pontuações iguais não são permitidas.");
      if(pA === 0 && pB === 0) return toast("Digite o placar antes de finalizar.");

      if(match.status !== "done"){
        // ── FINALIZAR: apply stats to athletes ──────────────────────────
        const aWon = pA > pB;
        const teamA = teamById(match.teamA), teamB = teamById(match.teamB);
        if(!teamA || !teamB) return toast("Equipe não encontrada.");
        const evId = uid();
        const playerDeltas = {}, teamDeltas = {};
        // Update team records
        [match.teamA, match.teamB].forEach(teamId => {
          const team = teamById(teamId);
          if(!team) return;
          const won = teamId === match.teamA ? aWon : !aWon;
          const prevRk = team.record.rk;
          team.record.w += won ? 1 : 0;
          team.record.l += won ? 0 : 1;
          const mySetsW = isGroup ? 0 : (teamId===match.teamA ? (match.setsA||0) : (match.setsB||0));
          const mySetsL = isGroup ? 0 : (teamId===match.teamA ? (match.setsB||0) : (match.setsA||0));
          team.record.setsW += mySetsW;
          team.record.setsL += mySetsL;
          team.record.rk += (won ? 3 : 0) + mySetsW * .5;
          teamDeltas[teamId] = {w:won?1:0, l:won?0:1, setsW:mySetsW, setsL:mySetsL, rk:team.record.rk - prevRk};
        });
        // Apply player stats
        let totalPts = 0, totalCoins = 0;
        [...(teamA.players||[]), ...(teamB.players||[])].forEach(id => {
          const a = athleteById(id);
          if(!a) return;
          const inA = (teamA.players||[]).includes(id);
          const won = inA ? aWon : !aWon;
          const mySets = isGroup ? 0 : (inA ? (match.setsA||0) : (match.setsB||0));
          const st = (match.stats||{})[id] || {};
          const calc = calcPlayerPoints(a, won, mySets, st);
          a.pts += calc.pts; a.coins += calc.coins; a.presences += 1; a.streak += 1;
          a.wins += won ? 1 : 0; a.losses += won ? 0 : 1;
          a.mvps += st.mvp ? 1 : 0; a.fairplays += st.fairplay ? 1 : 0;
          a.stats.aces += calc.aces; a.stats.attacks += calc.attacks; a.stats.attackAttempts += (calc.attackAttempts||0);
          a.stats.blocks += calc.blocks; a.stats.digs += calc.digs;
          a.stats.points += calc.points; a.stats.assists += calc.assists;
          a.stats.run3 += calc.run3; a.stats.run5 += calc.run5; a.stats.clutch += calc.clutch; a.stats.comeback += calc.comeback;
          a.history.push({eventId:evId, week:state.week, type:"tournament", phase:match.phase, pts:calc.pts, coins:calc.coins, won, points:calc.points, aces:calc.aces, attacks:calc.attacks, blocks:calc.blocks, digs:calc.digs, assists:calc.assists, run3:calc.run3, run5:calc.run5, clutch:calc.clutch, comeback:calc.comeback});
          playerDeltas[id] = {pts:calc.pts, coins:calc.coins, presences:1, streak:1, wins:won?1:0, losses:won?0:1, mvps:st.mvp?1:0, fairplays:st.fairplay?1:0, aces:calc.aces, attacks:calc.attacks, attackAttempts:calc.attackAttempts||0, blocks:calc.blocks, digs:calc.digs, points:calc.points, assists:calc.assists, run3:calc.run3, run5:calc.run5, clutch:calc.clutch, comeback:calc.comeback};
          totalPts += calc.pts; totalCoins += calc.coins;
        });
        match.playerDeltas = playerDeltas;
        match.teamDeltas   = teamDeltas;
        match.evId         = evId;
        match.status       = "done";
        const statsUsed = Object.keys(match.stats||{}).length > 0;
        toast("✓ Jogo finalizado! Pontos e estatísticas aplicados aos atletas." + (statsUsed ? "" : " (sem estatísticas — só resultado)"));

      } else {
        // ── REABRIR: rollback stats ───────────────────────────────────
        if(match.playerDeltas){
          Object.entries(match.playerDeltas).forEach(([id, delta]) => {
            const a = athleteById(id);
            if(!a) return;
            a.pts = Math.max(0, a.pts - (delta.pts||0));
            a.coins = Math.max(0, a.coins - (delta.coins||0));
            a.presences = Math.max(0, a.presences - (delta.presences||0));
            a.streak = Math.max(0, a.streak - (delta.streak||0));
            a.wins = Math.max(0, a.wins - (delta.wins||0));
            a.losses = Math.max(0, a.losses - (delta.losses||0));
            a.mvps = Math.max(0, a.mvps - (delta.mvps||0));
            a.fairplays = Math.max(0, a.fairplays - (delta.fairplays||0));
            a.stats.aces = Math.max(0, a.stats.aces - (delta.aces||0));
            a.stats.attacks = Math.max(0, a.stats.attacks - (delta.attacks||0));
            a.stats.attackAttempts = Math.max(0, a.stats.attackAttempts - (delta.attackAttempts||0));
            a.stats.blocks = Math.max(0, a.stats.blocks - (delta.blocks||0));
            a.stats.digs = Math.max(0, a.stats.digs - (delta.digs||0));
            a.stats.points = Math.max(0, a.stats.points - (delta.points||0));
            a.stats.assists = Math.max(0, a.stats.assists - (delta.assists||0));
            a.stats.run3 = Math.max(0, a.stats.run3 - (delta.run3||0));
            a.stats.run5 = Math.max(0, a.stats.run5 - (delta.run5||0));
            a.stats.clutch = Math.max(0, a.stats.clutch - (delta.clutch||0));
            a.stats.comeback = Math.max(0, a.stats.comeback - (delta.comeback||0));
            a.history = a.history.filter(h => h.eventId !== match.evId);
          });
        }
        if(match.teamDeltas){
          Object.entries(match.teamDeltas).forEach(([id, delta]) => {
            const team = teamById(id);
            if(!team) return;
            team.record.w = Math.max(0, team.record.w - (delta.w||0));
            team.record.l = Math.max(0, team.record.l - (delta.l||0));
            team.record.setsW = Math.max(0, team.record.setsW - (delta.setsW||0));
            team.record.setsL = Math.max(0, team.record.setsL - (delta.setsL||0));
            team.record.rk = Math.max(0, team.record.rk - (delta.rk||0));
          });
        }
        delete match.playerDeltas;
        delete match.teamDeltas;
        delete match.evId;
        match.status = "open";
        toast("Jogo reaberto. Estatísticas e pontos revertidos dos atletas.");
      }
      saveState();
      render();
    }
    function addTeamToGroup(tid){
      const tournament = state.tournaments.find(t=>t.id===tid);
      const teamId = document.getElementById("tourTeam-" + tid)?.value;
      const group = document.getElementById("tourGroup-" + tid)?.value || "A";
      if(!tournament || !teamId) return toast("Selecione uma equipe.");
      const team = teamById(teamId);
      if(!teamReadyForCategory(team, tournament.category)) return toast("A equipe precisa estar fechada e na mesma categoria do torneio.");
      tournament.groups = tournament.groups || {A:[],B:[]};
      if(Object.values(tournament.groups).flat().length >= 24) return toast("Limite maximo de 24 equipes no torneio.");
      if(Object.values(tournament.groups).flat().includes(teamId)) return toast("Equipe ja esta em um grupo.");

      toast("Equipe adicionada ao Grupo " + group + ".");

    function generateGroupMatches(tid){
      const tournament = state.tournaments.find(t=>t.id===tid);
      if(!tournament) return;
      tournament.matches = tournament.matches.filter(m=>!m.phase.startsWith("Grupo"));
      ["A","B"].forEach(group => {
        const teams = tournament.groups?.[group] || [];
        for(let i=0;i<teams.length;i++){
          for(let j=i+1;j<teams.length;j++){
            tournament.matches.push({id:uid(), phase:"Grupo " + group, scoring:"points18", teamA:teams[i], teamB:teams[j], pointsA:0, pointsB:0, setsA:0, setsB:0, status:"open", court:"", stats:{}});
          }
        }
      });
      toast("Jogos todos contra todos gerados.");
      render();
    }
    function generateFinalMatches(tid){
      const tournament = state.tournaments.find(t=>t.id===tid);
      if(!tournament) return;
      const a = groupStandings(tournament,"A").slice(0,2);
      const b = groupStandings(tournament,"B").slice(0,2);
      tournament.matches = tournament.matches.filter(m=>m.phase !== "Semifinal" && m.phase !== "Final");
      if(tournament.phases.includes("Grupo B") && a.length >= 2 && b.length >= 2){
        tournament.matches.push({id:uid(), phase:"Semifinal", scoring:"sets2", teamA:a[0].id, teamB:b[1].id, setsA:0, setsB:0, status:"open", court:"Semi 1", stats:{}});
        tournament.matches.push({id:uid(), phase:"Semifinal", scoring:"sets2", teamA:b[0].id, teamB:a[1].id, setsA:0, setsB:0, status:"open", court:"Semi 2", stats:{}});
        tournament.matches.push({id:uid(), phase:"Final", scoring:"sets2", teamA:"", teamB:"", setsA:0, setsB:0, status:"open", court:"Final", stats:{}});
      }else{
        const list = [...groupStandings(tournament,"A"), ...groupStandings(tournament,"B")].sort((x,y)=>y.w-x.w || y.diff-x.diff || y.pf-x.pf || x.name.localeCompare(y.name)).slice(0,2);
        if(list.length < 2) return toast("Precisa de pelo menos 2 equipes classificadas para gerar final.");
        tournament.matches.push({id:uid(), phase:"Final", scoring:"sets2", teamA:list[0].id, teamB:list[1].id, setsA:0, setsB:0, status:"open", court:"Final", stats:{}});
      }
      toast("Fase final gerada com os classificados.");
      render();
    }
    function groupStandings(tournament, group){
      const ids = tournament.groups?.[group] || [];
      const rows = Object.fromEntries(ids.map(id=>[id,{id, name:teamById(id)?.name || "Equipe", w:0, l:0, pf:0, pc:0, diff:0}]));
      tournament.matches.filter(m=>m.phase==="Grupo "+group && m.status==="done").forEach(m=>{
        if(!rows[m.teamA] || !rows[m.teamB]) return;
        rows[m.teamA].pf += Number(m.pointsA || 0); rows[m.teamA].pc += Number(m.pointsB || 0);
        rows[m.teamB].pf += Number(m.pointsB || 0); rows[m.teamB].pc += Number(m.pointsA || 0);
        if(Number(m.pointsA || 0) > Number(m.pointsB || 0)){rows[m.teamA].w++; rows[m.teamB].l++;} else {rows[m.teamB].w++; rows[m.teamA].l++;}
      });
      return Object.values(rows).map(r=>({...r,diff:r.pf-r.pc})).sort((a,b)=>b.w-a.w || b.diff-a.diff || b.pf-a.pf || a.name.localeCompare(b.name));
    }
    function matchWinnerLabel(m){
      if(m.status !== "done") return "Aguardando resultado";
      const isGroup = m.scoring === "points18" || m.phase.startsWith("Grupo");
      const winner = teamById(isGroup ? (m.pointsA > m.pointsB ? m.teamA : m.teamB) : (m.setsA > m.setsB ? m.teamA : m.teamB));
      return winner ? `Vencedor: ${winner.name}` : "Vencedor a definir";
    }
    function getTournamentChampion(t){
      const final = [...t.matches].reverse().find(m=>m.phase.toLowerCase().includes("final") && m.status==="done");
      if(!final) return null;
      const isPoints = final.scoring === "points18" || final.phase.startsWith("Grupo");
      if(isPoints){
        return teamById(final.pointsA > final.pointsB ? final.teamA : final.teamB);
      }
      return teamById(final.setsA > final.setsB ? final.teamA : final.teamB);
    }
    function csvEscape(value){
      return `"${String(value ?? "").replaceAll('"','""')}"`;
    }
    function downloadText(filename, content, mime="text/csv;charset=utf-8"){
      const blob = new Blob([content], {type:mime});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);

    function exportTournamentCsv(tid){
      const t = state.tournaments.find(x=>x.id===tid);

      const rows = [["Torneio","Tipo","Semana","Fase","Grupo","Quadra","Equipe A","Equipe B","Pontos A","Pontos B","Sets A","Sets B","Status","Vencedor"]];
      t.matches.forEach(m=>{
        const isGroup = m.phase.startsWith("Grupo");
        const winner = m.status==="done" ? teamById(isGroup ? (m.pointsA > m.pointsB ? m.teamA : m.teamB) : (m.setsA > m.setsB ? m.teamA : m.teamB))?.name : "";
        rows.push([t.name,labelEventType(t.type),t.week,m.phase,isGroup ? m.phase.replace("Grupo ","") : "",m.court || "",teamById(m.teamA)?.name || "",teamById(m.teamB)?.name || "",m.pointsA || "",m.pointsB || "",m.setsA || "",m.setsB || "",m.status,winner || ""]);
      });
      ["A","B"].forEach(g=>groupStandings(t,g).forEach((r,i)=>rows.push([t.name,"CLASSIFICACAO",t.week,"Grupo "+g,g,"",`${i+1}. ${r.name}`,"",r.pf,r.pc,"Vitorias "+r.w,"Saldo "+r.diff,"",""])));
      downloadText(slug(t.name) + "-torneio.csv", rows.map(r=>r.map(csvEscape).join(";")).join("\n"));
    }

    function addPrize(e){
      e.preventDefault();
      const data = prizePayload("prize");
      if(!data.name || data.cost <= 0) return toast("Preencha item e coins.");
      if(state.prizes.some(p=>p.name.toLowerCase() === data.name.toLowerCase())) return toast("Esse item ja existe.");
      state.prizes.push(data);
      toast("Item adicionado ao mercado.");
      render();
    }
    function updatePrize(e){
      e.preventDefault();
      const p = state.prizes.find(x=>x.id===editingPrizeId);
      if(!p) return toast("Item nao encontrado.");
      const data = prizePayload("editPrize");
      if(!data.name || data.cost <= 0) return toast("Preencha item e coins.");
      if(state.prizes.some(x=>x.id!==p.id && x.name.toLowerCase() === data.name.toLowerCase())) return toast("Ja existe outro item com esse nome.");
      Object.assign(p, {...data, id:p.id, active:p.active});
      editingPrizeId = "";
      toast("Item atualizado e salvo.");
      render();
    }
    function removePrize(id){
      const p = state.prizes.find(x=>x.id===id);
      if(!p) return;
      const used = state.redemptions.some(r=>r.prize === p.name || r.prizeId === p.id);
      if(used) return toast("Item ja teve resgate. Pause em vez de remover.");
      if(!confirm("Remover este item do mercado?")) return;
      state.prizes = state.prizes.filter(x=>x.id!==id);
      render();
    }
    function redeemPrize(){
      const a = athleteById(document.getElementById("redeemAth").value);
      const p = state.prizes.find(x=>x.id === document.getElementById("redeemPrize").value);
      if(!a || !p) return toast("Selecione atleta e premio.");
      if(a.coins < p.cost) return toast(a.name + " nao tem coins suficientes.");
      if(Number(p.stock || 0) <= 0) return toast("Item sem estoque/vaga disponivel.");
      a.coins -= p.cost;
      p.stock = Math.max(0, Number(p.stock || 0) - 1);
      state.redemptions.unshift({id:uid(), athleteId:a.id, athlete:a.name, prizeId:p.id, prize:p.name, cost:p.cost, realCost:Number(p.promoCost || p.realCost || 0), week:state.week, date:new Date().toISOString()});
      toast("Resgate confirmado.");
      render();
    }

    function generateContent(type){
      return {weekly:generateWeekly, stats:generateStats, teams:generateTeams, report:generateReport}[type]();
    }
    function generateWeekly(){
      const top = sortedAthletes().slice(0,5);
      return `RANKING UR VOLEI - SEMANA ${state.week}\n\n${top.length ? top.map((a,i)=>`${i+1}. ${a.name} - ${a.pts} pts (${a.coins} coins)`).join("\n") : "(sem dados)"}\n\nUltimate Rivals - Eleve o jogo.`;
    }
    function generateStats(){
      const t = totals();
      return `ESTATISTICAS UR - SEMANA ${state.week}\n\nPontos marcados: ${t.points}\nAces: ${t.aces}\nAtaques: ${t.attacks}\nAssistencias: ${t.assists}\nBloqueios: ${t.blocks}\nDefesas: ${t.digs}\nSequencias 3+: ${t.run3}\nSequencias 5+: ${t.run5}\nPontos decisivos: ${t.clutch}\nViradas: ${t.comeback}\n\n${leaderRowsText()}`;
    }
    function leaderRowsText(){
      const fields = [["Maior pontuador",a=>a.stats.points || 0],["Saque mais agressivo",a=>a.stats.aces],["Atacante mais eficiente",a=>a.stats.attacks],["Melhor levantamento",a=>a.stats.assists || 0],["Bloqueio dominante",a=>a.stats.blocks],["Defesa de areia",a=>a.stats.digs],["Especialista em viradas",a=>a.stats.comeback || 0],["MVP lider",a=>a.mvps]];
      return fields.map(([label,fn])=>{const a=[...state.athletes].sort((x,y)=>fn(y)-fn(x))[0];return `${label}: ${a ? `${a.name} (${fn(a)})` : "-"}`}).join("\n");
    }
    function generateTeams(){
      return `RANKING POR CATEGORIA - SEMANA ${state.week}\n\n` + Object.entries(categories).map(([id,c])=>{
        const list = state.teams.filter(t=>t.category===id).sort((a,b)=>b.record.rk-a.record.rk).slice(0,3);
        if(!list.length) return "";
        return `${c.label}\n` + list.map((t,i)=>`${i+1}. ${t.name} - ${t.record.w}V ${t.record.l}D (${Math.round(t.record.rk)} rk)`).join("\n");
      }).filter(Boolean).join("\n\n");
    }
    function generateReport(){
      const t = totals();
      return `RELATORIO UR VOLEI\n${state.season} - Semana ${state.week}\n\nAtletas: ${state.athletes.length}\nEquipes: ${state.teams.length}\nEventos: ${state.events.length}\nPontos gerados: ${t.pts}\nCoins em circulacao: ${t.coins}\n\nTOP 5\n${sortedAthletes().slice(0,5).map((a,i)=>`${i+1}. ${a.name} - ${a.pts} pts`).join("\n") || "(sem dados)"}\n\n${generateStats()}`;
    }
    function renderSettings(){
      const keys = Object.keys(defaultRules);
      const backups = getBackups();
      document.getElementById("view-settings").innerHTML = `
        ${sectionBanner("settings","Configuração de pontuação, temporada e backups")}
        <div class="grid">
          <div class="panel span-7">
            <h2>Pontuacao</h2>
            <div class="sub" style="margin-bottom:10px">Modelo recomendado: pontos valorizam desempenho e ranking; coins sao controlados para reduzir custo real. Acoes comuns geram poucos ou nenhum coin, enquanto presenca, vitoria, MVP, missoes e viradas geram recompensas moderadas.</div>
            <div class="table-wrap"><table><thead><tr><th>Regra</th><th>Pontos</th><th>Coins</th></tr></thead><tbody>${keys.map(k=>`<tr><td><strong>${ruleLabel(k)}</strong></td><td><input class="mini-input" type="number" value="${state.rules[k].pts}" data-rule="${k}:pts"></td><td><input class="mini-input" type="number" value="${state.rules[k].coins}" data-rule="${k}:coins"></td></tr>`).join("")}</tbody></table></div>
          </div>
          <div class="panel span-5">
            <h2>Temporada</h2>
            <div class="form">
              <div class="field full"><label>Nome</label><input id="seasonName" value="${esc(state.season)}"></div>
              <div class="field full"><label>Semana atual</label><input id="seasonWeek" type="number" min="1" max="12" value="${state.week}"></div>
              <button class="btn primary" id="saveSeason">Salvar temporada</button>
              <button class="btn gold" id="applyEconomy">Aplicar economia recomendada</button>
              <button class="btn primary" id="rescueAthletes" style="background:linear-gradient(135deg,#1a3a2a,#2a5a3a);border:1px solid #3a7a4a">🔄 Resgatar atletas &amp; zerar</button>
              <button class="btn danger" id="clearAll">⚠ Zerar sistema</button>
            </div>
            <h2 style="margin-top:16px">Backups automaticos</h2>
            <div class="sub" style="margin-bottom:8px">O sistema salva 3 backups rotativos a cada 5 interacoes. Voce pode restaurar qualquer um deles abaixo. Use "Backup JSON" no topo para salvar manualmente.</div>
            <div class="backup-slots">
              ${backups.length ? backups.map(b=>`<div class="backup-slot"><strong>Backup ${b.slot+1}</strong><div>${b.athletes} atletas | ${b.events} eventos</div><div style="color:var(--muted);margin-top:4px">${new Date(b.savedAt).toLocaleString("pt-BR")}</div><button class="btn small gold" style="margin-top:8px;width:100%" data-restore-backup="${b.slot}">Restaurar</button></div>`).join("") : `<div class="empty" style="grid-column:span 3">Nenhum backup automatico ainda. Registre mais eventos.</div>`}
            </div>
          </div>
        </div>
      `;
      document.querySelectorAll("[data-rule]").forEach(inp => inp.onchange = () => {const [k,f] = inp.dataset.rule.split(":"); state.rules[k][f] = Number(inp.value || 0); render();});
      document.getElementById("saveSeason").onclick = () => {state.season = document.getElementById("seasonName").value.trim() || "Temporada 01"; state.week = Number(document.getElementById("seasonWeek").value || 1); toast("Temporada salva."); render();};
      document.getElementById("applyEconomy").onclick = () => {
        state.rules = JSON.parse(JSON.stringify(defaultRules));
        state.prizes = mergePrizes([]);
        toast("Economia recomendada aplicada.");
        render();
      };
      document.getElementById("clearAll").onclick = () => {
        if(confirm("Zerar TODOS os dados? Exporte um backup JSON antes se quiser preservar os dados atuais.")){
          if(confirm("Tem certeza absoluta? Esta acao nao pode ser desfeita.")){
            localStorage.removeItem(STORAGE_KEY);
            state = loadState();
            toast("Sistema zerado.");
            render();
          }
        }
      };
      document.getElementById("rescueAthletes").onclick = () => {
        const athletes = state.athletes || [];
        if(!athletes.length){ toast("Nenhum atleta cadastrado."); return; }
        const lines = athletes.map((a,i)=>`${i+1}. ${a.name||"?"}  |  ${a.position||"—"}  |  ${a.contact||"sem contato"}  |  ${a.coins||0} coins  |  ${a.pts||0} pts`);
        const text = `ATLETAS — ${state.season||"Temporada 01"}\n${"─".repeat(42)}\n${lines.join("\n")}\n${"─".repeat(42)}\nTotal: ${athletes.length} atletas`;
        document.getElementById("rescueModal")?.remove();
        const ov = document.createElement("div");
        ov.className="modal-overlay"; ov.id="rescueModal";
        ov.innerHTML=`<div class="modal" style="max-width:520px">
          <button class="modal-close" id="rescueClose">✕</button>
          <h2 style="font-family:var(--font-display);font-size:18px;color:var(--gold-2);margin-bottom:4px;text-transform:uppercase">🔄 Resgate de Atletas</h2>
          <div class="sub" style="margin-bottom:12px">${athletes.length} atleta${athletes.length>1?"s":""} encontrado${athletes.length>1?"s":""}</div>
          <textarea style="width:100%;min-height:240px;font-family:monospace;font-size:12px;background:#07080c;border:1px solid var(--line);border-radius:8px;padding:10px;color:#e8e3d4;line-height:1.7;resize:vertical">${text}</textarea>
          <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
            <button class="btn gold" id="rescueCopy">📋 Copiar lista</button>
            <button class="btn primary" id="rescueKeep">✅ Zerar sistema e MANTER atletas</button>
            <button class="btn danger" id="rescueAll">🗑 Zerar TUDO</button>
            <button class="btn" id="rescueClose2">Cancelar</button>
          </div>
        </div>`;
        document.body.appendChild(ov);
        const close=()=>ov.remove();
        document.getElementById("rescueClose").onclick=close;
        document.getElementById("rescueClose2").onclick=close;
        ov.addEventListener("click",e=>{if(e.target===ov)close();});
        document.getElementById("rescueCopy").onclick=()=>{navigator.clipboard?.writeText(text);toast("Lista copiada!");};
        document.getElementById("rescueKeep").onclick=()=>{
          if(!confirm(`Zerar tudo EXCETO os ${athletes.length} atletas? Esta ação não pode ser desfeita.`)) return;
          const saved=JSON.parse(JSON.stringify(athletes));
          localStorage.removeItem(STORAGE_KEY);
          state=loadState();
          state.athletes=saved;
          state.athletes.forEach(a=>{a.pts=0;a.coins=0;a.history=[];a.crm=a.crm||{status:"lead",temp:"warm",lastContact:"",notes:""};});
          localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
          close(); toast("Sistema zerado! Atletas preservados."); render();
        };
        document.getElementById("rescueAll").onclick=()=>{
          if(!confirm("Zerar TUDO incluindo atletas? Esta ação não pode ser desfeita.")) return;
          localStorage.removeItem(STORAGE_KEY);
          state=loadState();
          close(); toast("Sistema completamente zerado."); render();
        };
      };
      document.querySelectorAll("[data-restore-backup]").forEach(btn => btn.onclick = () => restoreBackup(Number(btn.dataset.restoreBackup)));
    }
    function ruleLabel(k){
      return ({
        presence:"Presenca em partida", win:"Vitoria", loss:"Derrota", set:"Set vencido", ace:"Ace", attack:"Ataque", block:"Bloqueio", dig:"Defesa", point:"Ponto marcado", assist:"Assistencia", run3:"Sequencia de 3 pontos", run5:"Sequencia de 5 pontos", clutch:"Ponto decisivo", comeback:"Virada de jogo", mvp:"MVP", fairplay:"Fair Play", mission:"Missao", streak:"Sequencia 4 semanas", yellow:"Cartao amarelo", red:"Cartao vermelho", ctPresence:"CT presenca", ctEvolution:"CT evolucao", ctHighlight:"CT destaque"
      })[k] || k;
    }

    function normalizeFinance(f){
      const base = f || {};
      return {
        revenues: Array.isArray(base.revenues) ? base.revenues : [],
        expenses: Array.isArray(base.expenses) ? base.expenses : [],
        subscriptionPlans: Array.isArray(base.subscriptionPlans) ? base.subscriptionPlans : defaultSubscriptionPlans(),
        athleteSubscriptions: Array.isArray(base.athleteSubscriptions) ? base.athleteSubscriptions : [],
        sponsors: Array.isArray(base.sponsors) ? base.sponsors : [],
        monthlyGoal: Number(base.monthlyGoal || 3000)
      };
    }
    function defaultSubscriptionPlans(){
      return [

    function financeMetrics(){

      const monthRev = f.revenues.filter(r=>String(r.date||"").startsWith(thisMonth)).reduce((s,r)=>s+Number(r.amount||0),0);
      const monthExp = f.expenses.filter(e=>String(e.date||"").startsWith(thisMonth)).reduce((s,e)=>s+Number(e.amount||0),0);
      const totalRev = f.revenues.reduce((s,r)=>s+Number(r.amount||0),0);
      const totalExp = f.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
      const subRev = f.athleteSubscriptions.filter(s=>s.active).reduce((s,sub)=>{

      const athleteCount = Math.max(state.athletes.length, 1);
      const ltv = athleteCount ? Math.round((totalRev / athleteCount) * 12) : 0;
      const cac = f.expenses.filter(e=>e.category==="Marketing").reduce((s,e)=>s+Number(e.amount||0),0);
      return {monthRev, monthExp, monthProfit:monthRev-monthExp, totalRev, totalExp, totalProfit:totalRev-totalExp, subRev, ltv, cac, activeSubscriptions:f.athleteSubscriptions.filter(s=>s.active).length};

    function drawCashFlowChart(){
      const canvas = document.getElementById("finCashFlowCanvas");
      if(!canvas) return;
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const f = state.finance || normalizeFinance();
      const now = new Date();
      const months = [];
      for(let i=5;i>=0;i--){
        const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const label = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][d.getMonth()];
        const rev = f.revenues.filter(r=>String(r.date||"").startsWith(key)).reduce((s,r)=>s+Number(r.amount||0),0);
        const exp = f.expenses.filter(e=>String(e.date||"").startsWith(key)).reduce((s,e)=>s+Number(e.amount||0),0);
        months.push({label, rev, exp, profit:rev-exp});
      }
      const maxVal = Math.max(...months.flatMap(m=>[m.rev, m.exp]), 100);
      ctx.fillStyle = "#0a0b14"; ctx.fillRect(0,0,W,H);
      const padL=60,padR=16,padT=24,padB=46;
      const chartW=W-padL-padR, chartH=H-padT-padB;
      const barGroupW=chartW/months.length, barW=barGroupW*0.28;
      for(let i=0;i<=5;i++){
        const y=padT+(chartH/5)*i;
        ctx.strokeStyle="rgba(255,255,255,.06)"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
        const val=Math.round(maxVal-(maxVal/5)*i);
        ctx.fillStyle="rgba(255,255,255,.28)"; ctx.font="500 10px Barlow,sans-serif"; ctx.textAlign="right";
        ctx.fillText("R$"+(val>=1000?(val/1000).toFixed(1)+"k":val), padL-4, y+3);
      }
      const profitPoints=[];
      months.forEach((m,i)=>{
        const x=padL+i*barGroupW+barGroupW*.1;
        const revH=Math.max((m.rev/maxVal)*chartH,0);
        ctx.fillStyle="rgba(111,255,85,.75)";
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(x,padT+chartH-revH,barW,revH,[3,3,0,0]);
        else ctx.rect(x,padT+chartH-revH,barW,revH);
        ctx.fill();
        const expH=Math.max((m.exp/maxVal)*chartH,0);
        ctx.fillStyle="rgba(255,100,85,.75)";
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(x+barW+3,padT+chartH-expH,barW,expH,[3,3,0,0]);
        else ctx.rect(x+barW+3,padT+chartH-expH,barW,expH);
        ctx.fill();
        ctx.fillStyle="rgba(255,255,255,.38)"; ctx.font="700 11px 'Barlow Condensed',sans-serif"; ctx.textAlign="center";
        ctx.fillText(m.label, padL+i*barGroupW+barGroupW/2, H-10);
        const cx=padL+i*barGroupW+barGroupW/2;
        const cy=padT+chartH-Math.max(0,(m.profit/maxVal)*chartH);
        profitPoints.push({x:cx,y:cy,profit:m.profit});
      });
      ctx.beginPath(); ctx.strokeStyle="rgba(255,210,31,.9)"; ctx.lineWidth=2; ctx.setLineDash([4,3]);
      profitPoints.forEach((p,i)=>{ i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
      ctx.stroke(); ctx.setLineDash([]);
      profitPoints.forEach(p=>{
        ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
        ctx.fillStyle=p.profit>=0?"#ffd84d":"#ff8b8b"; ctx.fill();
        ctx.strokeStyle="#0a0b14"; ctx.lineWidth=1.5; ctx.stroke();
      });
      const legY=padT+2;
      [[38,"rgba(111,255,85,.75)","Receita"],[100,"rgba(255,100,85,.75)","Despesa"],[168,"#ffd84d","Lucro"]].forEach(([x,color,label])=>{
        ctx.fillStyle=color; ctx.fillRect(padL+x,legY,12,8);
        ctx.fillStyle="rgba(255,255,255,.45)"; ctx.font="600 10px Barlow,sans-serif"; ctx.textAlign="left";
        ctx.fillText(label, padL+x+15, legY+8);
      });
    }

    function bindTxFilter(){
      const applyFilter=()=>{
        const type=document.getElementById("finTxType")?.value||"all";
        const cat=document.getElementById("finTxCat")?.value||"all";
        const month=document.getElementById("finTxMonth")?.value||"";
        const search=(document.getElementById("finTxSearch")?.value||"").toLowerCase();
        const sort=document.getElementById("finTxSort")?.value||"date";
        const rows=[...document.querySelectorAll("#finTxBody tr")];
        let visible=0,total=0;
        rows.forEach(row=>{
          const show=(type==="all"||row.dataset.txType===type)&&(cat==="all"||row.dataset.txCat===cat)&&(!month||row.dataset.txMonth===month)&&(!search||row.dataset.txDesc.includes(search));
          row.style.display=show?"":"none";
          if(show){visible++;total+=parseFloat(row.dataset.txAmount||0);}
        });
        const tbody=document.getElementById("finTxBody");
        if(tbody){
          const visRows=[...tbody.querySelectorAll("tr:not([style*='none'])")];
          visRows.sort((a,b)=>sort==="amount"?parseFloat(b.dataset.txAmount)-parseFloat(a.dataset.txAmount):(b.dataset.txDate||"").localeCompare(a.dataset.txDate||""));
          visRows.forEach(r=>tbody.appendChild(r));
        }
        const countEl=document.getElementById("finTxCount");
        const totalEl=document.getElementById("finTxTotal");
        if(countEl) countEl.textContent=visible+" transações";
        if(totalEl) totalEl.textContent="Total filtrado: "+brl(total);

      ["finTxType","finTxCat","finTxMonth","finTxSearch","finTxSort"].forEach(id=>{
        const el=document.getElementById(id);
        if(el){el.oninput=el.onchange=applyFilter;}
      });
      applyFilter();

          <div class="field small"><label>Preço R$</label><input id="editPlanPrice" type="number" min="0" step="0.01" value="${plan.price}"></div>
          <div class="field full"><label>Descrição</label><input id="editPlanDesc" placeholder="Benefícios incluídos" value="${esc(plan.description||'')}"></div>
        </div>
